<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --bg:#f5f5f7;
  --card:#ffffff;
  --ink:#1d1d1f;
  --muted:#6e6e73;
  --line:#eeeeef;
  --blue:#007aff;
  --green:#34c759;
  --red:#ff3b30;
  --amber:#ffcc00;
  --shadow:none;
}
* { box-sizing:border-box; }
body {
  margin:0;
  padding:10px;
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:Helvetica,"Helvetica Neue",Arial,sans-serif;
  font-size:10pt;
  font-weight:400;
}
button, input, select, textarea {
  font-family:Helvetica,"Helvetica Neue",Arial,sans-serif;
  font-size:10pt;
  font-weight:400;
}
.site-container { width:min(1180px,100%); margin:0 auto; }
.top-bar { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
.top-controls {
  display:flex;
  align-items:center;
  gap:6px;
  flex:0 0 auto;
}
.top-controls select {
  width:auto;
  min-width:96px;
  height:36px;
  padding:6px 26px 6px 8px;
  font-size:12pt;
  font-weight:700;
  min-height:36px;
  border-radius:10px;
  color:var(--blue);
}
.tab-container {
  flex:1;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:2px;
  padding:0;
  height:36px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}
.tab {
  min-width:0;
  border:0;
  border-radius:9px;
  padding:6px 6px;
  height:34px;
  min-height:34px;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-weight:400;
  white-space:nowrap;
  overflow:hidden;
}
.tab > span:first-child { min-width:0; overflow:hidden; text-overflow:ellipsis; }
.kid-name { font-size:12pt; font-weight:700; line-height:1; }
.tab.active { background:var(--blue); color:#fff; box-shadow:none; }
.tab.active .rank-circle { background:#fff; color:var(--blue); }
.rank-circle {
  min-width:38px;
  height:22px;
  border-radius:999px;
  background:var(--blue);
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10pt;
  padding:0 8px;
}
.icon-btn, .btn {
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  border-radius:10px;
  min-height:30px;
  padding:5px 9px;
  cursor:pointer;
  font-weight:400;
}
.icon-btn { width:38px; padding:0; font-size:10pt; }
.btn.primary { background:var(--ink); border-color:var(--ink); color:#fff; }
.btn.danger { color:var(--red); }
.btn:active, .icon-btn:active, .tab:active { transform:scale(.98); }
.table-container { display:none; }
.table-container.active { display:block; }
.tracker-card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.table-scroll { width:100%; overflow-x:auto; }
.mobile-day-picker { display:none; }
table { width:100%; border-collapse:collapse; table-layout:fixed; min-width:0; }
tbody tr { min-height:30px; }
th, td {
  border-bottom:1px solid var(--line);
  text-align:center;
  padding:3px 2px;
  font-size:10pt;
  height:30px;
  vertical-align:middle;
  user-select:none;
}
th:first-child, td:first-child { width:120px; text-align:left; padding-left:8px; padding-right:5px; }
th { color:var(--muted); font-size:10pt; font-weight:400; background:#fff; }
th.current-day { color:var(--blue); background:#fff; }
.day-head {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:default;
  min-height:22px;
  width:100%;
  position:relative;
}
.note-dots {
  position:absolute;
  right:1px;
  display:inline-flex;
  gap:2px;
  min-width:18px;
  justify-content:flex-end;
}
.note-dot { width:5px; height:5px; border-radius:50%; display:inline-block; }
.note-dot.other { background:var(--blue); }
.note-dot.good { background:var(--green); }
.note-dot.bad { background:var(--red); }
.day-short { display:none; }
.category-label {
  width:100%;
  border:0;
  background:transparent;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  color:var(--ink);
  font-weight:400;
  cursor:pointer;
}
.category-name { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:100%; font-size:10pt; line-height:1; }
.category-label:active { color:var(--blue); }
input[type="checkbox"] {
  appearance:none;
  -webkit-appearance:none;
  width:38px;
  height:20px;
  border-radius:999px;
  border:0;
  background:#d1d1d6;
  position:relative;
  vertical-align:middle;
  cursor:pointer;
}
input[type="checkbox"]::before {
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  left:2px;
  top:2px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,.18);
  transition:transform .18s ease;
}
input[type="checkbox"]:checked { background:var(--blue); }
input[type="checkbox"][data-negative="true"]:checked { background:var(--red); }
input[type="checkbox"]:checked::before { transform:translateX(18px); }
input[type="number"], input[type="text"], select, textarea {
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:var(--ink);
  outline:0;
}
input[type="number"] {
  width:38px;
  height:22px;
  text-align:center;
  padding:2px;
  font-size:10pt;
  appearance:textfield;
  -moz-appearance:textfield;
  cursor:text;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance:none;
  margin:0;
}
input:focus, textarea:focus, select:focus { border-color:#c7c7cc; box-shadow:none; }
.total-row td {
  background:#fff;
  font-weight:400;
  border-top:1px solid #c7c7cc;
  border-bottom:0;
  height:30px;
  padding-top:4px;
  padding-bottom:4px;
}
.group-start td {
  border-top:2px solid #c7c7cc;
}
.group-start:first-child td {
  border-top:0;
}
.work-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.panel {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:9px;
}
.panel-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:6px; color:var(--muted); font-size:10pt; font-weight:400; }
.panel-actions { display:flex; gap:5px; align-items:center; }
.panel-add {
  width:28px;
  height:28px;
  border:0;
  border-radius:999px;
  background:#fff;
  border:1px solid var(--line);
  color:var(--blue);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:10pt;
  line-height:1;
  font-weight:400;
}
.panel-add:active { transform:scale(.96); }
.panel-edit.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.entry-row {
  display:grid;
  grid-template-columns:86px 1fr auto;
  gap:7px;
  align-items:center;
  margin-bottom:8px;
}
.entry-row.collapsed, .log-compose.collapsed { display:none; }
.log-compose {
  display:grid;
  grid-template-columns:68px 74px minmax(120px,1fr) minmax(120px,1fr) auto;
  gap:6px;
  align-items:center;
  margin-bottom:8px;
}
.entry-row input, .entry-row select, .log-compose input, .log-compose select { min-height:28px; padding:4px 7px; font-size:10pt; }
.task-list { display:grid; gap:7px; }
.task-item {
  display:grid;
  grid-template-columns:auto 1fr auto auto auto;
  gap:8px;
  align-items:center;
  min-height:32px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}
.task-item.done { opacity:.6; }
.day-chip {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
  height:24px;
  padding:0 9px;
  border-radius:999px;
  background:#fff;
  border:1px solid var(--line);
  color:var(--muted);
  font-size:10pt;
  font-weight:400;
}
.task-text { min-width:0; font-size:10pt; overflow-wrap:anywhere; }
.task-toggle { flex:0 0 auto; }
.mini-action {
  border:0;
  background:transparent;
  color:var(--muted);
  font-weight:400;
  cursor:pointer;
  width:30px;
  height:30px;
  padding:0;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10pt;
}
.mini-action:hover { background:rgba(118,118,128,.12); }
.mini-action.delete { color:var(--red); }
.empty-state { color:var(--muted); padding:8px; font-size:10pt; }
.log-list { display:grid; gap:7px; }
.log-item {
  display:grid;
  gap:3px;
  padding:8px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}
.log-item.good .day-chip { background:#e8f7ee; color:#1b7f3a; border-color:#ccebd6; }
.log-item.bad .day-chip { background:#fdebea; color:#b42318; border-color:#f8d0cd; }
.log-main { display:grid; grid-template-columns:auto 1fr auto auto; gap:7px; align-items:center; }
.log-copy { min-width:0; font-size:10pt; line-height:1.2; overflow-wrap:anywhere; }
.log-outcome { color:var(--muted); font-size:10pt; overflow-wrap:anywhere; }
.menu-wrap { position:relative; }
.menu-button {
  width:36px;
  min-width:36px;
  height:36px;
  min-height:36px;
  padding:0;
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.menu-button span {
  width:17px;
  height:2px;
  border-radius:999px;
  background:var(--ink);
  display:block;
}
.overflow-menu {
  display:none;
  position:absolute;
  left:0;
  top:calc(100% + 6px);
  min-width:150px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  box-shadow:0 8px 22px rgba(0,0,0,.10);
  z-index:10;
}
.overflow-menu.open { display:grid; gap:2px; }
.menu-section {
  display:none;
  position:absolute;
  left:calc(100% - 2px);
  top:0;
  min-width:172px;
  gap:2px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  box-shadow:0 8px 22px rgba(0,0,0,.10);
}
.menu-section.open { display:grid; }
#goal-folder-items { top:6px; }
#settings-folder-items { top:42px; }
#tracker-settings-folder-items { top:66px; }
.menu-item {
  border:0;
  background:#fff;
  color:var(--ink);
  min-height:30px;
  border-radius:8px;
  padding:5px 9px;
  text-align:left;
  cursor:pointer;
}
.menu-item:hover { background:#f5f5f7; }
.menu-item.danger { color:var(--red); }
.screen-view { display:none; }
.screen-view.active { display:block; }
.screen-bar {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}
#screen-title { color:var(--muted); }
#screen-content > .modal-content {
  width:100%;
  max-height:none;
  box-shadow:none;
  border:1px solid var(--line);
  border-radius:14px;
}
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
  align-items:center;
  justify-content:center;
  padding:14px;
  z-index:20;
}
.modal-content {
  width:min(1040px,96vw);
  max-height:96vh;
  overflow:auto;
  background:var(--card);
  border-radius:18px;
  box-shadow:0 18px 50px rgba(0,0,0,.2);
  padding:14px;
}
.modal-title { margin:0 0 12px; font-size:10pt; font-weight:400; }
.modal-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.modal-toolbar select { width:auto; min-width:130px; padding:6px 28px 6px 9px; }
.field { display:grid; gap:5px; margin-bottom:10px; }
.field label { color:var(--muted); font-size:10pt; font-weight:400; }
.field textarea { min-height:72px; resize:vertical; padding:9px; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap; margin-top:12px; }
.auth-screen {
  min-height:100vh;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.auth-card {
  width:min(380px,100%);
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
}
.setup-check {
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  margin:6px 0 2px;
}
.setup-check input[type="checkbox"] { flex:0 0 auto; }
#category-modal .modal-content { width:min(1320px,98vw); }
.category-editor { display:grid; gap:0; min-width:1120px; max-height:68vh; overflow:auto; }
.category-header, .category-row {
  display:grid;
  grid-template-columns:34px 104px minmax(210px,1fr) 92px 92px 78px 68px 68px 74px 78px 96px 34px;
  gap:8px;
  align-items:center;
}
.category-header {
  position:sticky;
  top:0;
  z-index:2;
  padding:0 0 7px;
  background:#fff;
  color:var(--muted);
  font-weight:700;
  border-bottom:1px solid var(--line);
}
.category-row { padding:7px 0; border-bottom:1px solid var(--line); }
.drag-handle { cursor:grab; color:var(--muted); text-align:center; user-select:none; }
.category-row.dragging { opacity:.45; }
.move-pair { display:flex; gap:4px; }
.move-category { width:28px; min-height:28px; padding:0; }
.category-row input, .category-row select { min-height:30px; padding:5px 8px; min-width:0; }
.category-row input[type="number"] { width:100%; min-width:82px; }
.category-row textarea {
  min-height:44px;
  padding:5px 8px;
  resize:vertical;
  overflow-wrap:anywhere;
}
.category-row .remove-category { color:var(--red); padding:0; }
.category-detail { color:var(--muted); line-height:1.4; margin:0; white-space:pre-wrap; }
#category-detail-modal .modal-content { width:min(430px,92vw); }
.category-detail-form { display:grid; gap:8px; }
.category-detail-form textarea { min-height:108px; padding:8px; resize:vertical; }
.category-detail-meta { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.summary-table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:12px; }
.summary-table { min-width:640px; }
.summary-table th:first-child, .summary-table td:first-child { width:90px; }
.summary-table td, .summary-table th { padding:6px 8px; }
.summary-empty { color:var(--muted); padding:12px; }
.summary-goal-blue { background:#9fd0ff; color:#003b73; }
.summary-goal-green { background:#a7e8bd; color:#0b4f24; }
.summary-goal-yellow { background:#ffe27a; color:#5c4300; }
.summary-goal-red { background:#ffaaa4; color:#7a120b; }
.summary-controls { display:grid; grid-template-columns:auto auto auto auto 1fr auto; gap:8px; align-items:center; margin-bottom:10px; }
.summary-controls select, .summary-controls input { min-width:112px; padding:6px 9px; }
.summary-refresh { justify-self:end; width:30px; min-height:30px; border-radius:999px; padding:0; }
.calc-value {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:22px;
  color:var(--muted);
  user-select:none;
}
.goal-progress-cell { color:var(--muted); width:50px; white-space:nowrap; }
.goal-percent {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:38px;
  height:20px;
  border-radius:999px;
  padding:0 5px;
}
@media(max-width:760px) {
  body { padding:6px; overflow-x:hidden; }
  .top-bar { align-items:stretch; flex-wrap:wrap; }
  .top-controls { width:100%; }
  .site-container { width:100%; min-width:0; }
  .tab-container { grid-template-columns:repeat(6,minmax(0,1fr)); gap:2px; padding:0; height:36px; }
  .tab { flex-direction:row; gap:2px; padding:5px 1px; font-size:10pt; height:34px; min-height:34px; }
  .kid-name { font-size:0; }
  .kid-name::first-letter { font-size:12pt; }
  .rank-circle { height:18px; min-width:25px; padding:0 4px; font-size:10pt; }
  .work-grid { grid-template-columns:1fr; }
  .mobile-day-picker {
    display:none;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:2px;
    padding:4px;
    border-bottom:1px solid var(--line);
    background:#fff;
  }
  .day-filter {
    border:0;
    border-radius:8px;
    background:#fff;
    color:var(--muted);
    min-height:26px;
    padding:0;
    font-size:10pt;
    font-weight:400;
    cursor:pointer;
  }
  .day-filter.active { background:#f5f5f7; color:var(--ink); }
  .entry-row { grid-template-columns:72px 1fr auto; }
  .log-compose { grid-template-columns:58px 64px minmax(0,1fr) auto; gap:5px; }
  .log-compose input[id$="-log-outcome"] { grid-column:3 / 4; }
  .log-compose button { grid-column:4 / 5; grid-row:2; }
  .task-item { grid-template-columns:auto 1fr auto; }
  .task-item .mini-action { grid-column:auto; }
  .log-main { grid-template-columns:auto 1fr auto auto; }
  .table-scroll { overflow-x:hidden; }
  table { min-width:0; width:100%; }
  .hidden-day { display:table-cell; }
  tbody tr, th,td { height:26px; min-height:26px; }
  th,td { padding:2px 0; font-size:9pt; }
  th:first-child, td:first-child { width:68px; padding-left:4px; padding-right:2px; }
  .category-name { font-size:9pt; }
  .day-head { gap:1px; min-height:19px; }
  .day-full { display:none; }
  .day-short { display:inline; }
  .note-dots { right:0; gap:1px; min-width:8px; }
  .note-dot { width:4px; height:4px; }
  input[type="checkbox"] { width:28px; height:16px; }
  input[type="checkbox"]::before { width:12px; height:12px; top:2px; }
  input[type="checkbox"]:checked::before { transform:translateX(12px); }
  input[type="number"] { width:34px; height:18px; font-size:9pt; padding:1px; }
  .calc-value { width:26px; height:18px; font-size:9pt; }
  .goal-progress-cell { width:38px; }
  .goal-percent { min-width:32px; height:18px; padding:0 3px; font-size:9pt; }
  .category-row { grid-template-columns:1fr; }
  .category-editor { min-width:0; }
  .move-pair { justify-content:flex-start; }
  .category-row .remove-category { width:100%; }
  .summary-controls { grid-template-columns:1fr 1fr; }
.modal-content { border-radius:16px; }
}
</style>
</head>
<body>
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <h3 class="modal-title">Daily Progress</h3>
    <div class="field">
      <label>Email</label>
      <input id="auth-email" type="email" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="auth-password" type="password" autocomplete="current-password">
    </div>
    <label class="setup-check">
      <input id="auth-stay-signed-in" type="checkbox" checked>
      <span>Stay signed in</span>
    </label>
    <div class="modal-actions">
      <button class="btn" id="auth-create">Create Account</button>
      <button class="btn primary" id="auth-signin">Sign In</button>
    </div>
    <div class="empty-state" id="auth-message"></div>
  </div>
</div>

<div class="auth-screen" id="household-screen">
  <div class="auth-card">
    <h3 class="modal-title">Household Setup</h3>
    <div class="field">
      <label>Household Name</label>
      <input id="household-name" type="text" placeholder="Family name">
    </div>
    <div class="field">
      <label>Scoring</label>
      <select id="household-scoring">
        <option value="money">Money</option>
        <option value="points">Points</option>
        <option value="percent">Percentages</option>
        <option value="completion">Completion</option>
      </select>
    </div>
    <div class="field">
      <label>Weekly Reset Day</label>
      <select id="household-reset-day">
        <option value="1">Monday</option>
        <option value="0">Sunday</option>
        <option value="6">Saturday</option>
      </select>
    </div>

const LEGACY_KIDS = ["Ryan","Jack","Henry","Sonny","Meg","Wes"];

const DEFAULT_CATEGORIES = [

function getYearWeek(date = new Date()) {
  const tmpDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = tmpDate.getUTCDay() || 7;
  tmpDate.setUTCDate(tmpDate.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(tmpDate.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((tmpDate - yearStart) / 86400000) + 1) / 7);
  return `${tmpDate.getUTCFullYear()}-W${weekNo}`;
}

function dollars(value) {
  return `$${Math.round(value)}`;
}

function noteKey(kid, day) {
  return `${kid}-${day}`;
}

function combinedGood(data = {}) {
  return data.goodReward ?? [data.good, data.rewards].filter(Boolean).join("\n");
}

function combinedBad(data = {}) {
  return data.badPunishment ?? [data.bad, data.punishments].filter(Boolean).join("\n");
}

function dayOptions(selected = todayIndex) {
  return days.map((day, index) => `<option value="${index}" ${index === selected ? "selected" : ""}>${day}</option>`).join("");
}

function makeId(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function memberIdFromName(name = "Member") {
  return name.trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "") || makeId("member");
}

function memberLabel(memberId) {
  return householdMembers.find(member => member.id === memberId)?.displayName || memberId;
}

function memberInitials(name = "") {
  return name.split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]?.toUpperCase() || "").join("") || "?";
}

function householdRef() {
  if (!householdId) throw new Error("No household selected.");
  return db.collection("households").doc(householdId);
}

function householdCollection(name) {
  return householdRef().collection(name);
}

function trackerSettingsRef() {
  return householdCollection("settings").doc("tracker");
}

}

async function refreshLegacyImportOption() {
  canImportLegacy = false;
  const row = document.getElementById("household-import-row");
  const checkbox = document.getElementById("household-import-legacy");
  if (row) row.style.display = "none";
  if (checkbox) checkbox.checked = false;
  if (!currentUser) return;
  try {
    const doc = await db.collection("legacyImports").doc(currentUser.uid).get();
    canImportLegacy = doc.exists && doc.data().enabled === true && doc.data().email === currentUser.email;
  } catch (error) {
    canImportLegacy = false;
  }
  if (row) row.style.display = canImportLegacy ? "flex" : "none";
}

function friendlyFirebaseError(error, fallback = "Something went wrong.") {
  const code = error?.code || "";
  if (code === "auth/email-already-in-use") return "That email already has an account. Use Sign In.";
  if (code === "auth/invalid-email") return "Enter a valid email address.";
  if (code === "auth/weak-password") return "Use a password with at least 6 characters.";
  if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-login-credentials") return "Email or password is incorrect.";
  if (code === "auth/operation-not-allowed") return "Email/password sign-in is not enabled in Firebase Authentication.";
  if (code === "permission-denied") return "Signed in, but Firestore rules blocked account or household data. Temporarily allow legacy migration or deploy the household rules.";
  return error?.message || fallback;
}

function promptDay(currentDay) {
  const entered = prompt("Day number, 1-7:", String(Number(currentDay) + 1));
  if (entered === null) return null;
  const day = Number(entered) - 1;
  return Number.isInteger(day) && day >= 0 && day < days.length ? day : Number(currentDay);
}

function formatTodayLabel() {
  return new Date().toLocaleDateString(undefined, {month:"short", day:"numeric"});
}

function previousWeekKey(weekKey = currentWeek) {
  const date = dateFromWeekKey(weekKey) || new Date();
  date.setUTCDate(date.getUTCDate() - 7);
  return getYearWeek(date);
}

function normalizeCategory(category, index) {
  const defaults = DEFAULT_CATEGORY_MAP[category.key] || {};
  const rawLabel = (category.label || defaults.label || category.key || `Row ${index + 1}`).trim();
  const label = defaults.label && !category.details ? defaults.label : rawLabel;
  const key = (category.key || label).trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase() || `row-${index + 1}`;
  const kind = ["check","number","calculated"].includes(category.kind) ? category.kind : "check";
  return {
    key,
    label,
    details:(category.details || defaults.details || label).trim(),
    kind,
    amount:Number(category.amount || 0),
    group:(category.group || defaults.group || "").trim(),
    goal:Number(category.goal ?? defaults.goal ?? 0),
    goalType:category.goalType === "max" ? "max" : "min",
    goalPeriod:category.goalPeriod === "daily" ? "daily" : "weekly",
    showProgress:category.showProgress === true || category.showTarget === true || category.showWeekly === true,
    formula:(category.formula || "").trim()
  };
}

function cloneCategories(list = DEFAULT_CATEGORIES) {
  return list.map((category, index) => normalizeCategory({...category}, index));
}

function categoriesForKid(kid) {
  if (!categoriesByKid[kid] || !categoriesByKid[kid].length) {
    categoriesByKid[kid] = cloneCategories(categories);
  }
  return categoriesByKid[kid];
}

function setAllKidsCategories(list) {
  const normalized = cloneCategories(list);
  categories = cloneCategories(normalized);
  categoriesByKid = Object.fromEntries(kids.map(kid => [kid, cloneCategories(normalized)]));
}

function seedMembersFromNames(names = LEGACY_KIDS) {
  return names.map((name, index) => ({
    id:name,
    displayName:name,
    initials:memberInitials(name),
    role:"child",
    goal:0,
    order:index,
    archived:false
  }));
}

async function loadUserHousehold() {
  const userDoc = await db.collection("users").doc(currentUser.uid).get();
  if (userDoc.exists && userDoc.data().activeHouseholdId) {
    householdId = userDoc.data().activeHouseholdId;
    const roleDoc = await householdRef().collection("userRoles").doc(currentUser.uid).get();
    if (roleDoc.exists) return true;
  }
  return false;
}

async function createHousehold(name, options = {}) {
  const householdDoc = db.collection("households").doc();
  householdId = householdDoc.id;
  const now = new Date();
  const householdPayload = {
    name:name.trim() || "My Household",
    scoringMode:options.scoringMode || "money",
    weeklyResetDay:Number(options.weeklyResetDay ?? 1),
    createdBy:currentUser.uid,
    createdAt:now,
    updatedAt:now,
    legacyMigrated:false
  };
  await householdDoc.set(householdPayload);
  await householdDoc.collection("userRoles").doc(currentUser.uid).set({
    role:"owner",
    email:currentUser.email || "",
    createdAt:now
  });
  await db.collection("users").doc(currentUser.uid).set({
    activeHouseholdId:householdId,
    createdAt:now,
    updatedAt:now
  }, {merge:true});
  await Promise.all(seedMembersFromNames().map(member => householdDoc.collection("members").doc(member.id).set({...member, createdAt:now, updatedAt:now})));
  await trackerSettingsRef().set({categories:cloneCategories(DEFAULT_CATEGORIES), categoriesByKid:{}, updatedAt:now}, {merge:true});
  householdData = householdPayload;
  return householdId;
}

async function createLegacyHouseholdForUser() {
  await createHousehold(`${currentUser.email?.split("@")[0] || "Family"} Household`, {scoringMode:"money", weeklyResetDay:1});
  await migrateLegacyData();
}

async function copyCollectionDocs(sourceCollectionRef, targetCollectionRef) {
  const snap = await sourceCollectionRef.get();
  await Promise.all(snap.docs.map(doc => targetCollectionRef.doc(doc.id).set(doc.data(), {merge:true})));
}

async function migrateLegacyData() {
  try {
    const legacySettings = await db.collection("settings").doc("tracker").get();
    if (legacySettings.exists) await trackerSettingsRef().set({...legacySettings.data(), migratedAt:new Date()}, {merge:true});
    const weeksSnap = await db.collection("weeks").get();
    await Promise.all(weeksSnap.docs.map(async weekDoc => {
      const targetWeek = weekRef(weekDoc.id);
      await targetWeek.set(weekDoc.data(), {merge:true});
      await Promise.all(["chores", "notes", "tasks", "logs", "notepads"].map(name => copyCollectionDocs(weekDoc.ref.collection(name), targetWeek.collection(name))));
    }));
    await householdRef().set({legacyMigrated:true, updatedAt:new Date()}, {merge:true});
  } catch (error) {
    console.warn("Legacy migration skipped or incomplete.", error);
  }
}

async function loadHouseholdMembers() {
  const snap = await householdCollection("members").orderBy("order", "asc").get();
  householdMembers = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
  if (!householdMembers.length) {
    householdMembers = seedMembersFromNames();
    await Promise.all(householdMembers.map(member => householdCollection("members").doc(member.id).set({...member, createdAt:new Date(), updatedAt:new Date()}, {merge:true})));
  }
  kids = householdMembers.filter(member => !member.archived).sort((a, b) => Number(a.order || 0) - Number(b.order || 0)).map(member => member.id);
  if (!kids.length) {
    const fallback = householdMembers[0] || seedMembersFromNames(["Member"])[0];
    kids = [fallback.id];
  }
  if (!kids.includes(activeKid)) activeKid = kids[0];
  if (!kids.includes(categoryEditorKid)) categoryEditorKid = kids[0];
}

async function loadCategories() {
  const doc = await trackerSettingsRef().get();
  const data = doc.exists ? doc.data() : {};
  if (data.categoriesByKid && typeof data.categoriesByKid === "object") {
    kids.forEach(kid => {
      const saved = Array.isArray(data.categoriesByKid[kid]) && data.categoriesByKid[kid].length ? data.categoriesByKid[kid] : data.categories;
      categoriesByKid[kid] = cloneCategories((saved || DEFAULT_CATEGORIES).filter(category => category.key !== "other"));
    });
    categories = cloneCategories(categoriesByKid[kids[0]]);
  } else if (Array.isArray(data.categories) && data.categories.length) {
    setAllKidsCategories(data.categories.filter(category => category.key !== "other"));
  } else {
    setAllKidsCategories(DEFAULT_CATEGORIES);
  }
}

async function saveCategories() {
  categoriesByKid[categoryEditorKid] = readCategoryEditor().map(normalizeCategory);
  categories = cloneCategories(categoriesByKid[kids[0]]);
  await trackerSettingsRef().set({
    categories:categoriesByKid[kids[0]],
    categoriesByKid
  }, {merge:true});
  buildShell();
  await loadData(currentWeek);
  closeModal("category-modal");
}

function buildShell() {
  const tabs = document.getElementById("kid-tabs");
  const views = document.getElementById("kid-views");
  tabs.innerHTML = "";
  views.innerHTML = "";
  kids.forEach((kid, index) => {
    const tab = document.createElement("button");
    tab.className = `tab ${kid === activeKid ? "active" : ""}`;
    tab.dataset.kid = kid;
    tab.innerHTML = `<span class="kid-name">${escapeHtml(memberLabel(kid))}</span><span class="rank-circle" id="rank-${kid}">$0</span>`;
    tabs.appendChild(tab);

    const view = document.createElement("section");
    view.id = kid;
    view.className = `table-container ${kid === activeKid ? "active" : ""}`;
    views.appendChild(view);
  });
  buildTables();
}

function buildTables() {
  kids.forEach(kid => {
    const container = document.getElementById(kid);
    const kidCategories = categoriesForKid(kid);
    const showProgressColumn = kidCategories.some(category => category.showProgress);
    let html = `<div class="tracker-card"><div class="table-scroll"><table><thead><tr><th></th>`;
    days.forEach((day, i) => {
      const highlight = i === todayIndex ? "current-day" : "";
      html += `<th class="${highlight}" data-kid="${kid}" data-day="${i}" data-day-cell="${i}"><span class="day-head"><span class="day-full">${day}</span><span class="day-short">${day.slice(0,1)}</span><span class="note-dots" id="${kid}-dots-${i}"></span></span></th>`;
    });
    if (showProgressColumn) html += `<th class="goal-progress-cell">Total</th>`;
    html += `</tr></thead><tbody>`;
    let previousGroup = "";
    kidCategories.forEach(category => {
      const group = category.group || "";
      const groupClass = group && group !== previousGroup ? "group-start" : "";
      previousGroup = group;
      html += `<tr class="${groupClass}"><td><button class="category-label" data-category-key="${category.key}" data-category-kid="${kid}"><span class="category-name">${escapeHtml(category.label)}</span></button></td>`;
      days.forEach((day, i) => {
        if (category.kind === "calculated") {
          html += `<td data-day-cell="${i}"><span class="calc-value" id="${kid}-calc-${category.key}-${i}">0</span></td>`;
        } else if (category.kind === "number") {
          html += `<td data-day-cell="${i}"><input type="number" min="0" inputmode="numeric" pattern="[0-9]*" data-kid="${kid}" data-day="${i}" data-type="${category.key}"></td>`;
        } else {
          const negative = category.amount < 0 ? "true" : "false";
          html += `<td data-day-cell="${i}"><input type="checkbox" data-negative="${negative}" data-kid="${kid}" data-day="${i}" data-type="${category.key}"></td>`;
        }
      });
      if (showProgressColumn) html += `<td class="goal-progress-cell" id="${kid}-week-${category.key}">${category.showProgress ? "<span class=\"goal-percent summary-goal-red\">0%</span>" : ""}</td>`;
      html += `</tr>`;
    });
    html += `<tr class="total-row"><td>Total</td>`;
    days.forEach((day, i) => { html += `<td id="${kid}-total-${i}" data-day-cell="${i}">$0</td>`; });
    if (showProgressColumn) html += `<td></td>`;
    html += `</tr></tbody></table></div></div>`;
    html += `<div class="work-grid"><div class="panel"><div class="panel-head"><span>Other Tasks</span><div class="panel-actions"><button class="panel-add panel-edit" data-toggle-task-edit="${kid}" aria-label="Edit other tasks">✎</button><button class="panel-add" data-toggle-entry="${kid}-task-entry" aria-label="Add other task">+</button></div></div><div class="entry-row collapsed" id="${kid}-task-entry"><select id="${kid}-task-day" aria-label="Task day">${dayOptions()}</select><input id="${kid}-task-text" type="text" placeholder="Add task"><button class="btn primary" data-add-task="${kid}">Add</button></div><div class="task-list" id="${kid}-tasks"></div></div>`;

function formatRawValue(value) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "0";
  return Number.isInteger(number) ? String(number) : number.toFixed(1);
}

function formulaName(category) {
  return String(category.key || category.label || "").replace(/[^a-z0-9_]+/gi, "_").replace(/^_+|_+$/g, "") || "value";
}

function formulaAliases(category) {
  const names = new Set();
  [category.key, category.label].filter(Boolean).forEach(value => {
    const alias = formulaName({key:value});
    names.add(alias);
    names.add(alias.toLowerCase());
  });
  return [...names].filter(name => /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name));
}

function escapeRegExp(text = "") {
  return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function formulaReferencesCategory(formula = "", category) {
  const text = String(formula || "");
  if (!text.trim()) return false;
  const quotedNames = [category.key, category.label].filter(Boolean);
  if (quotedNames.some(name => new RegExp(`(["'])${escapeRegExp(name)}\\1`, "i").test(text))) return true;
  return formulaAliases(category).some(alias => new RegExp(`\\b${escapeRegExp(alias)}\\b`).test(text));
}

function categoryDayValue(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") {
    if (!categoryDayHasEntry(kid, category, dayIndex, data, stack)) return 0;
    return evaluateFormula(category, kid, dayIndex, data, stack);
  }
  if (data) {
    const value = data[`${dayIndex}-${category.key}`];
    return category.kind === "number" ? Number(value || 0) : value ? 1 : 0;
  }
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return 0;
  return category.kind === "number" ? Number(input.value || 0) : input.checked ? 1 : 0;
}

function categoryDayHasEntry(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") {
    if (stack.has(category.key)) return false;
    const nextStack = new Set(stack);
    nextStack.add(category.key);
    const referenced = categoriesForKid(kid).filter(other => {
      if (other.key === category.key) return false;
      return formulaReferencesCategory(category.formula, other);
    });
    const dependencies = referenced.length ? referenced : categoriesForKid(kid).filter(other => other.key !== category.key);
    return dependencies.some(other => categoryDayHasEntry(kid, other, dayIndex, data, nextStack));
  }
  if (data) return Object.prototype.hasOwnProperty.call(data, `${dayIndex}-${category.key}`);
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return false;
  return category.kind === "number" ? input.value !== "" : true;
}

function evaluateFormula(category, kid, dayIndex, data = null, stack = new Set()) {
  const formula = (category.formula || "").trim();
  if (!formula || stack.has(category.key)) return 0;
  const nextStack = new Set(stack);
  nextStack.add(category.key);
  const scope = {};
  const labelValues = {};
  categoriesForKid(kid).forEach(other => {
    if (other.key === category.key) return;
    const value = categoryDayValue(kid, other, dayIndex, data, nextStack);
    formulaAliases(other).forEach(alias => { scope[alias] = value; });
    [other.key, other.label].filter(Boolean).forEach(name => {
      labelValues[String(name).toLowerCase()] = value;
    });
  });
  try {
    const expression = formula.replace(/(["'])(.*?)\1/g, (match, quote, label) => {
      const value = labelValues[String(label).toLowerCase()];
      return Number.isFinite(Number(value)) ? String(value) : match;
    });
    const names = Object.keys(scope);
    const values = Object.values(scope);
    const result = Function(...names, `"use strict"; return (${expression});`)(...values);
    const number = Number(result);
    return Number.isFinite(number) ? number : 0;
  } catch (error) {
    return 0;
  }
}

function goalPercent(category, value, count = 1) {
  const goal = Number(category.goal || 0);
  const number = goalComparisonValue(category, value, count);
  if (!Number.isFinite(goal) || goal <= 0) {
    if (category.goalType === "max") return number <= 0 ? 100 : 0;
    return number > 0 ? 100 : 0;
  }
  return Math.round((number / goal) * 100);
}

function goalComparisonValue(category, value, count = 1) {
  const number = Number(value || 0);
  const divisor = Math.max(Number(count || 1), 1);
  return number / divisor;
}

function updateTotals() {
  kids.forEach(kid => {
    let kidTotal = 0;
    const weeklyRaw = {};
    const weeklyCounts = {};
    days.forEach((day, i) => {
      let dayTotal = 0;
      categoriesForKid(kid).forEach(category => {
        const raw = categoryDayValue(kid, category, i);
        if (category.kind === "calculated") {
          const calcNode = document.getElementById(`${kid}-calc-${category.key}-${i}`);
          if (calcNode) calcNode.textContent = categoryDayHasEntry(kid, category, i) ? formatRawValue(raw) : "";
        }
        weeklyRaw[category.key] = (weeklyRaw[category.key] || 0) + raw;
        if (category.goalPeriod === "daily" && categoryDayHasEntry(kid, category, i)) {
          weeklyCounts[category.key] = (weeklyCounts[category.key] || 0) + 1;
        }
        dayTotal += raw * category.amount;
      });
      kidTotal += dayTotal;
      document.getElementById(`${kid}-total-${i}`).textContent = dollars(dayTotal);
    });
    categoriesForKid(kid).forEach(category => {
      const weekNode = document.getElementById(`${kid}-week-${category.key}`);
      if (weekNode) {
        if (category.showProgress) {
          const value = weeklyRaw[category.key] || 0;
          const count = category.goalPeriod === "daily" ? weeklyCounts[category.key] || 1 : 1;
          weekNode.innerHTML = `<span class="goal-percent ${goalClass(category, value, count)}">${goalPercent(category, value, count)}%</span>`;
        } else {
          weekNode.textContent = "";
        }
      }
    });
    document.getElementById(`rank-${kid}`).textContent = dollars(kidTotal);
  });
}

function scoreDataForKid(kid, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    categoriesForKid(kid).forEach(category => {
      total += categoryDayValue(kid, category, i, data) * category.amount;
    });
  });
  return total;
}

function categoryRawValue(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    total += categoryDayValue(kid, category, i, data);
  });
  return total;
}

function categoryEntryCount(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    if (categoryDayHasEntry(kid, category, i, data)) total += 1;
  });
  return total;
}

function dateFromWeekKey(weekKey) {
  const match = String(weekKey).match(/^(\d{4})-W(\d{1,2})$/);
  if (!match) return null;
  const year = Number(match[1]);
  const week = Number(match[2]);
  const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
  const day = simple.getUTCDay() || 7;
  simple.setUTCDate(simple.getUTCDate() + 1 - day);
  return simple;
}

function bucketLabel(weekKey, bucket) {
  const date = dateFromWeekKey(weekKey);
  if (!date) return weekKey;
  if (bucket === "year") return String(date.getUTCFullYear());
  if (bucket === "month") return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`;
  return weekKey;
}

function periodStart(date, bucket) {
  const copy = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
  if (bucket === "year") copy.setUTCMonth(0, 1);
  if (bucket === "month") copy.setUTCDate(1);
  if (bucket === "week") {
    const day = copy.getUTCDay() || 7;
    copy.setUTCDate(copy.getUTCDate() + 1 - day);
  }
  copy.setUTCHours(0, 0, 0, 0);
  return copy;
}

async function summaryWeekKeys(bucket = "week", count = 12) {
  const snap = await householdCollection("weeks").orderBy("timestamp", "desc").get();
  const keys = new Set([currentWeek]);
  snap.forEach(doc => keys.add(doc.id));
  const parsed = [...keys].map(key => ({key, date:dateFromWeekKey(key)})).filter(item => item.date);
  const starts = [...new Set(parsed.map(item => periodStart(item.date, bucket).toISOString()))].sort().reverse().slice(0, Math.max(Number(count || 12), 1));
  const allowed = new Set(starts);
  return parsed.filter(item => allowed.has(periodStart(item.date, bucket).toISOString())).map(item => item.key).sort().reverse();
}

function formatSummaryMetric(value) {
  const mode = householdData?.scoringMode || "money";
  const rounded = Math.round(Number(value || 0));
  if (mode === "money") return dollars(value);
  if (mode === "percent") return `${rounded}%`;
  if (mode === "completion") return String(rounded);
  return `${rounded} pts`;
}

async function fetchOverallSummaryRows(bucket, count) {
  const weekKeys = await summaryWeekKeys(bucket, count);
  const rows = kids.map(kid => ({kid, score:0, weeks:weekKeys.length || 1}));
  await Promise.all(weekKeys.flatMap(weekKey => rows.map(async row => {
    const choresDoc = await weekRef(weekKey).collection("chores").doc(row.kid).get();
    row.score += scoreDataForKid(row.kid, choresDoc.exists ? choresDoc.data() : {});
  })));
  return rows;
}

function renderOverallSummaryRows(rows) {
  const head = `<tr><th>Person</th><th>Total</th></tr>`;
  const body = rows.map(row => `<tr><td>${escapeHtml(memberLabel(row.kid))}</td><td>${formatSummaryMetric(row.score)}</td></tr>`).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

async function fetchDetailedSummary(kid, bucket, count) {
  const weekKeys = await summaryWeekKeys(bucket, count);
  const buckets = {};
  await Promise.all(weekKeys.map(async weekKey => {
    const label = bucketLabel(weekKey, bucket);
    if (!buckets[label]) buckets[label] = {weeks:new Set(), values:{}};
    buckets[label].weeks.add(weekKey);
    const choresDoc = await weekRef(weekKey).collection("chores").doc(kid).get();
    const data = choresDoc.exists ? choresDoc.data() : {};
    categoriesForKid(kid).forEach(category => {
      buckets[label].values[category.key] = (buckets[label].values[category.key] || 0) + categoryRawValue(kid, category, data);
      buckets[label].values[`${category.key}__count`] = (buckets[label].values[`${category.key}__count`] || 0) + categoryEntryCount(kid, category, data);
    });
  }));
  return {labels:Object.keys(buckets).sort().reverse().slice(0, Math.max(Number(count || 12), 1)), buckets};
}

function renderDetailedSummary(kid, detail) {
  const categories = categoriesForKid(kid);
  let head = `<tr><th>Item</th><th>Period</th><th>Type</th><th>Goal</th>`;
  detail.labels.forEach(label => { head += `<th>${label}</th>`; });
  head += `</tr>`;
  let previousGroup = "";
  const body = categories.map(category => {
    const group = category.group || "";
    const groupClass = group && group !== previousGroup ? "group-start" : "";
    previousGroup = group;
    const goalType = category.goalType === "min" ? "Min" : "Max";
    const goalPeriod = category.goalPeriod === "daily" ? "D" : "W";
    let html = `<tr class="${groupClass}"><td>${escapeHtml(category.label)}</td><td>${goalPeriod}</td><td>${goalType}</td><td>${Number(category.goal || 0).toFixed(0)}</td>`;
    detail.labels.forEach(label => {
      const bucket = detail.buckets[label];
      const sum = bucket.values[category.key] || 0;
      const weeks = Math.max(bucket.weeks.size, 1);
      const count = category.goalPeriod === "daily" ? bucket.values[`${category.key}__count`] || 1 : weeks;
      const value = category.goalPeriod === "daily" ? sum / count : sum;
      const cellClass = category.goalPeriod === "daily" ? goalClass(category, value, 1, true) : goalClass(category, value, count);
      html += `<td class="${cellClass}">${value.toFixed(0)}</td>`;
    });
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function goalClass(category, value, count = 1, valueIsNormalized = false) {
  const goal = Number(category.goal || 0);
  const comparisonValue = valueIsNormalized ? Number(value || 0) : goalComparisonValue(category, value, count);
  if (!Number.isFinite(goal) || goal < 0) return "";
  if (category.goalType === "min") {
    if (goal === 0) return comparisonValue > 0 ? "summary-goal-blue" : "summary-goal-green";
    if (comparisonValue >= goal * 1.5) return "summary-goal-blue";
    if (comparisonValue >= goal) return "summary-goal-green";
    if (comparisonValue >= goal * .5) return "summary-goal-yellow";
    return "summary-goal-red";
  }
  if (goal === 0) return comparisonValue <= 0 ? "summary-goal-green" : "summary-goal-red";
  if (comparisonValue <= goal * .5) return "summary-goal-blue";
  if (comparisonValue <= goal) return "summary-goal-green";
  if (comparisonValue <= goal * 1.5) return "summary-goal-yellow";
  return "summary-goal-red";
}

async function refreshSummary() {
  const content = document.getElementById("summary-content");
  const kind = document.getElementById("summary-kind").value;
  const bucket = document.getElementById("summary-bucket").value;
  const count = Number(document.getElementById("summary-count").value || 12);
  content.className = "summary-empty";
  content.textContent = "Loading summary...";
  if (kind === "detailed") {
    const kid = document.getElementById("summary-person").value || activeKid;
    const detail = await fetchDetailedSummary(kid, bucket, count);
    content.className = "";
    content.innerHTML = detail.labels.length ? renderDetailedSummary(kid, detail) : `<div class="summary-empty">No data in this range.</div>`;
    return;
  }
  const rows = await fetchOverallSummaryRows(bucket, count);
  content.className = "";
  content.innerHTML = renderOverallSummaryRows(rows);
}

async function openSummary() {
  document.getElementById("summary-person").innerHTML = kids.map(kid => `<option value="${kid}" ${kid === activeKid ? "selected" : ""}>${escapeHtml(memberLabel(kid))}</option>`).join("");
  syncSummaryControls();
  openMainScreen("summary-modal", "Summary");

}

    control.style.display = detailed ? "" : "none";
  });

}

function switchKid(kid) {
  activeKid = kid;
  document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.kid === kid));
  document.querySelectorAll(".table-container").forEach(view => view.classList.toggle("active", view.id === kid));
}

function applyDayFocus(kid, dayIndex) {
  const container = document.getElementById(kid);
  if (!container) return;
  container.querySelectorAll("[data-day-cell]").forEach(cell => {
    cell.classList.toggle("hidden-day", Number(cell.dataset.dayCell) !== Number(dayIndex));
  });
  container.querySelectorAll("[data-filter-day]").forEach(button => {

  });
}

function renderNoteIndicators() {
  kids.forEach(kid => {
    days.forEach((day, i) => {
      const hasGood = (logsCache[kid] || []).some(entry => Number(entry.day) === i && entry.type === "good");
      const dots = document.getElementById(`${kid}-dots-${i}`);
      if (!dots) return;
      dots.innerHTML = "";
      if (hasGood) dots.insertAdjacentHTML("beforeend", `<span class="note-dot good" title="Good"></span>`);
    });
  });
}

async function loadTasks(kid) {
  const doc = await weekRef(currentWeek).collection("tasks").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().items) ? doc.data().items : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    if ((data.other || "").trim()) {
      legacy.push({id:`legacy-task-${i}`, day:i, text:data.other, done:!!data.otherDone, legacy:true});
    }
  });
  tasksCache[kid] = saved.length ? saved : legacy;
}

async function saveTasks(kid) {
  await weekRef(currentWeek).set({timestamp:new Date()}, {merge:true});
  await weekRef(currentWeek).collection("tasks").doc(kid).set({items:tasksCache[kid] || [], updatedAt:new Date()});
}

function renderTaskList(kid) {
  const list = document.getElementById(`${kid}-tasks`);
  if (!list) return;
  document.querySelector(`[data-toggle-task-edit="${kid}"]`)?.classList.toggle("active", !!taskEditMode[kid]);
  const items = tasksCache[kid] || [];
  if (!items.length) {
    list.innerHTML = `<div class="empty-state">No other tasks added yet.</div>`;
    return;
  }
  list.innerHTML = items.map(item => {
    const done = item.done ? "done" : "";
    const checked = item.done ? "checked" : "";
    const actions = taskEditMode[kid] ? `<button class="mini-action" title="Edit" aria-label="Edit task" data-edit-task="${kid}" data-task-id="${item.id}">✎</button><button class="mini-action delete" title="Delete" aria-label="Delete task" data-delete-task="${kid}" data-task-id="${item.id}">×</button>` : "";
    return `<div class="task-item ${done}"><div class="day-chip">${days[Number(item.day)] || "Any"}</div><div class="task-text">${escapeHtml(item.text || "")}</div><input class="task-toggle" type="checkbox" ${checked} aria-label="Done" data-toggle-task="${kid}" data-task-id="${item.id}">${actions}</div>`;
  }).join("");
}

async function addTask(kid) {
  const textInput = document.getElementById(`${kid}-task-text`);
  const dayInput = document.getElementById(`${kid}-task-day`);
  const text = textInput.value.trim();
  if (!text) return;
  tasksCache[kid] = [...(tasksCache[kid] || []), {id:makeId("task"), day:Number(dayInput.value), text, done:false}];
  textInput.value = "";
  await saveTasks(kid);
  document.getElementById(`${kid}-task-entry`)?.classList.add("collapsed");
  renderTaskList(kid);
  renderNoteIndicators();
}

async function toggleTask(kid, id) {
  tasksCache[kid] = (tasksCache[kid] || []).map(task => task.id === id ? {...task, done:!task.done} : task);
  await saveTasks(kid);
  renderTaskList(kid);
  renderNoteIndicators();
}

async function editTask(kid, id) {
  const task = (tasksCache[kid] || []).find(item => item.id === id);
  if (!task) return;
  const day = promptDay(task.day);
  if (day === null) return;
  const text = prompt("Edit task:", task.text || "");
  if (text === null) return;
  const trimmed = text.trim();
  if (!trimmed) return;
  tasksCache[kid] = (tasksCache[kid] || []).map(item => item.id === id ? {...item, day, text:trimmed} : item);
  await saveTasks(kid);
  renderTaskList(kid);
  renderNoteIndicators();
}

async function deleteTask(kid, id) {
  if (!confirm("Delete this task?")) return;
  tasksCache[kid] = (tasksCache[kid] || []).filter(item => item.id !== id);
  await saveTasks(kid);
  renderTaskList(kid);
  renderNoteIndicators();
}

async function loadLogs(kid) {
  const doc = await weekRef(currentWeek).collection("logs").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().entries) ? doc.data().entries : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    const good = combinedGood(data).trim();
    const bad = combinedBad(data).trim();
    if (good) legacy.push({id:`legacy-good-${i}`, day:i, type:"good", note:good, outcome:"", legacy:true});
    if (bad) legacy.push({id:`legacy-bad-${i}`, day:i, type:"bad", note:bad, outcome:"", legacy:true});
  });
  logsCache[kid] = saved.length ? saved : legacy;
}

async function saveLogs(kid) {
  await weekRef(currentWeek).set({timestamp:new Date()}, {merge:true});
  await weekRef(currentWeek).collection("logs").doc(kid).set({entries:logsCache[kid] || [], updatedAt:new Date()});
}

function renderLogList(kid) {
  const list = document.getElementById(`${kid}-logs`);
  if (!list) return;
  document.querySelector(`[data-toggle-log-edit="${kid}"]`)?.classList.toggle("active", !!logEditMode[kid]);
  const entries = logsCache[kid] || [];
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">No good or bad notes logged yet.</div>`;
    return;
  }
  list.innerHTML = entries.slice().reverse().map(entry => {
    const type = entry.type === "bad" ? "bad" : "good";
    const outcomeLabel = type === "bad" ? "Punishment" : "Reward";
    const actions = logEditMode[kid] ? `<button class="mini-action" title="Edit" aria-label="Edit log entry" data-edit-log="${kid}" data-log-id="${entry.id}">✎</button><button class="mini-action delete" title="Delete" aria-label="Delete log entry" data-delete-log="${kid}" data-log-id="${entry.id}">×</button>` : "";
    return `<div class="log-item ${type}"><div class="log-main"><span class="day-chip">${days[Number(entry.day)] || "Any"}</span><div class="log-copy">${escapeHtml(entry.note || "")}</div>${actions}</div><div class="log-outcome">${outcomeLabel}: ${escapeHtml(entry.outcome || "")}</div></div>`;
  }).join("");
}

async function addLog(kid) {
  const dayInput = document.getElementById(`${kid}-log-day`);
  const typeInput = document.getElementById(`${kid}-log-type`);
  const noteInput = document.getElementById(`${kid}-log-note`);
  const outcomeInput = document.getElementById(`${kid}-log-outcome`);
  const note = noteInput.value.trim();
  const outcome = outcomeInput.value.trim();
  if (!note && !outcome) return;
  logsCache[kid] = [...(logsCache[kid] || []), {id:makeId("log"), day:Number(dayInput.value), type:typeInput.value, note, outcome}];
  noteInput.value = "";
  outcomeInput.value = "";
  await saveLogs(kid);
  document.getElementById(`${kid}-log-entry`)?.classList.add("collapsed");
  renderLogList(kid);
  renderNoteIndicators();
}

async function editLog(kid, id) {
  const entry = (logsCache[kid] || []).find(item => item.id === id);
  if (!entry) return;
  const day = promptDay(entry.day);
  if (day === null) return;
  const typeInput = prompt("Type good or bad:", entry.type || "good");
  if (typeInput === null) return;
  const type = typeInput.trim().toLowerCase() === "bad" ? "bad" : "good";
  const note = prompt("Edit note:", entry.note || "");
  if (note === null) return;
  const outcome = prompt(type === "bad" ? "Edit punishment:" : "Edit reward:", entry.outcome || "");
  if (outcome === null) return;
  logsCache[kid] = (logsCache[kid] || []).map(item => item.id === id ? {...item, day, type, note:note.trim(), outcome:outcome.trim()} : item);
  await saveLogs(kid);
  renderLogList(kid);
  renderNoteIndicators();
}

async function deleteLog(kid, id) {
  if (!confirm("Delete this log entry?")) return;
  logsCache[kid] = (logsCache[kid] || []).filter(item => item.id !== id);
  await saveLogs(kid);
  renderLogList(kid);
  renderNoteIndicators();
}

async function populateWeekDropdown() {
  const select = document.getElementById("week-select");
  select.innerHTML = "";
  const weeksSnap = await householdCollection("weeks").get();
  const seen = new Set();
  weeksSnap.forEach(doc => {
    seen.add(doc.id);
  });
  seen.add(currentWeek);
  [...seen].sort((a, b) => b.localeCompare(a, undefined, {numeric:true})).forEach(weekKey => {
    select.appendChild(new Option(weekKey, weekKey, weekKey === currentWeek, weekKey === currentWeek));
  });
  select.appendChild(new Option("Add New", "__add_new__"));
}

async function ensureWeekOption(weekKey) {
  const select = document.getElementById("week-select");
  if (![...select.options].some(option => option.value === weekKey)) {
    select.prepend(new Option(weekKey, weekKey, true, true));
  }
  select.value = weekKey;
}

async function addHistoricalWeek() {
  const entered = prompt("Week to add, like 2026-W07:", previousWeekKey());
  if (entered === null) return;
  const weekKey = entered.trim().toUpperCase();
  if (!/^\d{4}-W\d{2}$/.test(weekKey)) {
    alert("Use the format YYYY-W##.");
    document.getElementById("week-select").value = currentWeek;
    return;
  }
  const existing = document.getElementById("week-select");
  if ([...existing.options].some(option => option.value === weekKey)) {
    alert("That week already exists.");
    existing.value = currentWeek;
    return;
  }
  await weekRef(weekKey).set({timestamp:new Date(), historical:true}, {merge:true});
  await populateWeekDropdown();
  await loadData(weekKey);
}

function openMainScreen(modalId, title, backLabel = "Tracker") {
  showTrackerScreen(false);
  const modal = document.getElementById(modalId);
  const content = modal?.querySelector(".modal-content");
  if (!modal || !content) return;
  if (currentScreen) restoreScreenModal();
  currentScreen = {modalId, parent:modal, content};
  modal.style.display = "none";
  document.getElementById("screen-title").textContent = title;
  document.getElementById("screen-back").textContent = `Back to ${backLabel}`;
  document.getElementById("screen-content").appendChild(content);
  document.getElementById("kid-views").style.display = "none";
  document.getElementById("kid-tabs").style.display = "none";
  document.getElementById("screen-view").classList.add("active");
}

function restoreScreenModal() {
  if (!currentScreen) return;
  currentScreen.parent.appendChild(currentScreen.content);
  currentScreen.parent.style.display = "none";
  currentScreen = null;
}

function showTrackerScreen(restore = true) {
  if (restore) restoreScreenModal();
  document.getElementById("screen-view")?.classList.remove("active");
  const content = document.getElementById("screen-content");
  if (content && !currentScreen) content.innerHTML = "";
  document.getElementById("kid-views").style.display = "";
  document.getElementById("kid-tabs").style.display = "";
}

function escapeHtml(text = "") {
  return text.replace(/[&<>"']/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));
}

function escapeAttr(text = "") {
  return escapeHtml(String(text));
}

async function handleSignedInUser(user) {
  const token = ++authLoadToken;
  currentUser = user;
  setAuthMessage("Signed in. Loading household...");
  const hasHousehold = await loadUserHousehold();
  if (token !== authLoadToken) return;
  if (hasHousehold) {
    await startHouseholdApp();
  } else {
    await refreshLegacyImportOption();
    setHouseholdMessage("Create a household to continue.");
    showOnly("household-screen");
  }
}

async function signInOrCreate(createAccount = false) {
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const staySignedIn = document.getElementById("auth-stay-signed-in").checked;
  if (!email || !password) {
    setAuthMessage("Enter an email and password.");
    return;
  }
  setAuthMessage(createAccount ? "Creating account..." : "Signing in...");
  try {
    await auth.setPersistence(staySignedIn ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
    const credential = createAccount
      ? await auth.createUserWithEmailAndPassword(email, password)
      : await auth.signInWithEmailAndPassword(email, password);
    await handleSignedInUser(credential.user);
  } catch (error) {
    setAuthMessage(friendlyFirebaseError(error, "Sign in failed."));
  }
}

async function confirmSignOut() {
  if (!confirm("Sign out of this household?")) return;
  await auth.signOut();
}

async function createHouseholdFromSetup() {
  const name = document.getElementById("household-name").value.trim();
  const scoringMode = document.getElementById("household-scoring").value;
  const weeklyResetDay = document.getElementById("household-reset-day").value;
  const importLegacy = document.getElementById("household-import-legacy").checked;
  if (!name) {
    setHouseholdMessage("Name the household first.");
    return;
  }
  setHouseholdMessage("Creating household...");
  try {
    if (importLegacy && !canImportLegacy) {
      setHouseholdMessage("This account is not approved to import existing tracker data.");
      return;
    }
    firstHouseholdSetup = !importLegacy;
    await createHousehold(name, {scoringMode, weeklyResetDay});
    if (importLegacy) {
      setHouseholdMessage("Importing existing tracker data...");
      await migrateLegacyData();
    }
    await startHouseholdApp();
    if (firstHouseholdSetup) openMemberEditor();
  } catch (error) {
    setHouseholdMessage(error.message || "Could not create household.");
  }
}

document.body.addEventListener("click", async event => {
  if (!event.target.closest(".menu-wrap")) closeActionsMenu();

  const tab = event.target.closest(".tab");
  if (tab) switchKid(tab.dataset.kid);

  const categoryButton = event.target.closest("[data-category-key]");
  if (categoryButton) openCategoryDetail(categoryButton.dataset.categoryKey, categoryButton.dataset.categoryKid);

  const dayFilterButton = event.target.closest("[data-filter-day]");
  if (dayFilterButton) applyDayFocus(dayFilterButton.dataset.filterKid, dayFilterButton.dataset.filterDay);

  const toggleEntryButton = event.target.closest("[data-toggle-entry]");
  if (toggleEntryButton) {
    const form = document.getElementById(toggleEntryButton.dataset.toggleEntry);
    if (form) form.classList.toggle("collapsed");
  }

  const taskEditButton = event.target.closest("[data-toggle-task-edit]");
  if (taskEditButton) {
    const kid = taskEditButton.dataset.toggleTaskEdit;
    taskEditMode[kid] = !taskEditMode[kid];
    renderTaskList(kid);
  }

  const logEditButton = event.target.closest("[data-toggle-log-edit]");
  if (logEditButton) {
    const kid = logEditButton.dataset.toggleLogEdit;
    logEditMode[kid] = !logEditMode[kid];
    renderLogList(kid);
  }

  const addTaskButton = event.target.closest("[data-add-task]");
  if (addTaskButton) await addTask(addTaskButton.dataset.addTask);

  const toggle = event.target.closest("[data-toggle-task]");
  if (toggle) await toggleTask(toggle.dataset.toggleTask, toggle.dataset.taskId);

  const editTaskButton = event.target.closest("[data-edit-task]");
  if (editTaskButton) await editTask(editTaskButton.dataset.editTask, editTaskButton.dataset.taskId);

  const deleteTaskButton = event.target.closest("[data-delete-task]");
  if (deleteTaskButton) await deleteTask(deleteTaskButton.dataset.deleteTask, deleteTaskButton.dataset.taskId);

  const addLogButton = event.target.closest("[data-add-log]");
  if (addLogButton) await addLog(addLogButton.dataset.addLog);

  const editLogButton = event.target.closest("[data-edit-log]");
  if (editLogButton) await editLog(editLogButton.dataset.editLog, editLogButton.dataset.logId);

  const deleteLogButton = event.target.closest("[data-delete-log]");
  if (deleteLogButton) await deleteLog(deleteLogButton.dataset.deleteLog, deleteLogButton.dataset.logId);

  const moveCategoryButton = event.target.closest("[data-move-category]");
  if (moveCategoryButton) {
    const row = moveCategoryButton.closest(".category-row");
    if (row && moveCategoryButton.dataset.moveCategory === "up" && row.previousElementSibling) {
      row.parentElement.insertBefore(row, row.previousElementSibling);
    }
    if (row && moveCategoryButton.dataset.moveCategory === "down" && row.nextElementSibling) {
      row.parentElement.insertBefore(row.nextElementSibling, row);
    }
  }

  if (event.target.closest(".remove-member")) event.target.closest(".category-row").remove();
  if (event.target.closest(".remove-category")) event.target.closest(".category-row").remove();
});

let draggedCategoryRow = null;
document.body.addEventListener("dragstart", event => {
  const handle = event.target.closest(".drag-handle");
  if (!handle) return;
  draggedCategoryRow = handle.closest(".category-row");
  if (!draggedCategoryRow) return;
  draggedCategoryRow.classList.add("dragging");
  event.dataTransfer.effectAllowed = "move";
});
document.body.addEventListener("dragend", () => {
  draggedCategoryRow?.classList.remove("dragging");
  draggedCategoryRow = null;
});
document.body.addEventListener("dragover", event => {
  if (!draggedCategoryRow) return;
  const target = event.target.closest("#category-editor .category-row");
  if (!target || target === draggedCategoryRow) return;
  event.preventDefault();
  const rect = target.getBoundingClientRect();
  const after = event.clientY > rect.top + rect.height / 2;
  target.parentElement.insertBefore(draggedCategoryRow, after ? target.nextSibling : target);
});

document.getElementById("summary-close").addEventListener("click", () => closeModal("summary-modal"));
document.getElementById("add-category").addEventListener("click", () => addCategoryRow());
document.getElementById("add-member").addEventListener("click", () => addMemberRow({order:document.querySelectorAll("#member-editor .category-row").length, role:"child"}));
document.getElementById("close-members").addEventListener("click", () => closeModal("members-modal"));
document.getElementById("save-members").addEventListener("click", saveMembers);
document.getElementById("settings-close").addEventListener("click", () => closeModal("settings-modal"));
document.getElementById("settings-save").addEventListener("click", saveHouseholdSettings);
document.getElementById("settings-members").addEventListener("click", () => {
  closeModal("settings-modal");
  openMemberEditor();
});
document.getElementById("settings-categories").addEventListener("click", () => {
  closeModal("settings-modal");
  openCategoryEditor();
});
document.getElementById("import-categories").addEventListener("click", importCategoryConfig);
document.getElementById("category-person").addEventListener("change", event => {
  categoriesByKid[categoryEditorKid] = readCategoryEditor().map(normalizeCategory);
  categoryEditorKid = event.target.value;
  refreshImportOptions();
  renderCategoryEditor(categoryEditorKid);
});
document.getElementById("close-categories").addEventListener("click", () => closeModal("category-modal"));
document.getElementById("save-categories").addEventListener("click", saveCategories);
document.getElementById("close-category-detail").addEventListener("click", () => closeModal("category-detail-modal"));
document.getElementById("save-category-detail").addEventListener("click", saveCategoryDetail);
document.getElementById("archive-week").addEventListener("click", async () => {
  closeActionsMenu();
  await weekRef(currentWeek).set({archived:true, timestamp:new Date()}, {merge:true});
  await populateWeekDropdown();
});
document.getElementById("clear-week").addEventListener("click", async () => {
  closeActionsMenu();
  const pass = prompt("Enter password to clear week:");
  if (pass !== CLEAR_PASSWORD) {
    alert("Incorrect password.");
    return;
  }
  for (const collectionName of ["chores", "notes", "notepads", "tasks", "logs"]) {
    const snap = await weekRef(currentWeek).collection(collectionName).get();
    for (const doc of snap.docs) await doc.ref.delete();
  }
  await loadData(currentWeek);
});
document.getElementById("week-select").addEventListener("change", async event => {
  if (event.target.value === "__add_new__") {
    await addHistoricalWeek();
    return;
  }
  await loadData(event.target.value);
});
document.body.addEventListener("change", event => {
  const input = event.target.closest("[data-kid][data-day][data-type]");
  if (input) saveData(input.dataset.kid);
});

document.body.addEventListener("input", event => {
  const input = event.target.closest("[data-kid][data-day][data-type]");
  if (input) updateTotals();
});

window.onload = () => {
  showOnly("auth-screen");
  auth.onAuthStateChanged(async user => {
    try {
      if (!user) {
        authLoadToken++;
        currentUser = null;
        householdId = null;
        showOnly("auth-screen");
        return;
      }
      if (currentUser?.uid === user.uid && householdId) return;
      await handleSignedInUser(user);
    } catch (error) {
      console.error(error);
      setAuthMessage(friendlyFirebaseError(error, "Could not load account."));
      showOnly("auth-screen");
    }
  });
};
</script>
</body>
