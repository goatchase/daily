<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --bg:#f8fafd;
  --chrome:#f1f3f4;
  --card:#ffffff;
  --ink:#202124;
  --muted:#5f6368;
  --line:#dadce0;
  --soft-line:#edf0f3;
  --blue:#1a73e8;
  --blue-soft:#edf4ff;
  --green:#188038;
  --red:#d93025;
  --amber:#f9ab00;
  --shadow:0 1px 2px rgba(60,64,67,.16),0 1px 3px rgba(60,64,67,.08);
}
* { box-sizing:border-box; }
body {
  margin:0;
  padding:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:"Source Sans Pro","Google Sans","Helvetica Neue",Arial,sans-serif;
  font-size:10pt;
  font-weight:400;
}
button, input, select, textarea {
  font-family:"Source Sans Pro","Google Sans","Helvetica Neue",Arial,sans-serif;
  font-size:10pt;
  font-weight:400;
}
.site-container { width:100%; margin:0 auto; }
.top-bar {
  display:flex;
  gap:12px;
  align-items:center;
  margin:0;
  padding:8px 14px;
  background:#fff;
  border-bottom:1px solid var(--soft-line);
  position:sticky;
  top:0;
  z-index:8;
}
.top-controls {
  display:flex;
  align-items:center;
  gap:8px;
  flex:0 0 auto;
}
.top-controls select {
  width:auto;
  min-width:104px;
  height:36px;
  padding:6px 28px 6px 12px;
  font-size:11pt;
  font-weight:700;
  min-height:36px;
  border-radius:999px;
  color:var(--ink);
  border-color:#dadce0;
  background:#fff;
}
.tab-container {
  flex:1;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:4px;
  padding:0;
  height:36px;
  background:transparent;
  border:0;
  border-radius:999px;
  overflow:hidden;
}
.tab {
  min-width:0;
  border:0;
  border-radius:999px;
  padding:6px 8px;
  height:34px;
  min-height:34px;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-weight:400;
  white-space:nowrap;
  overflow:hidden;
}
.tab > span:first-child { min-width:0; overflow:hidden; text-overflow:ellipsis; }
.kid-name { font-size:12pt; font-weight:700; line-height:1; }
.tab:hover { background:#f1f3f4; color:var(--ink); }
.tab.active { background:#f1f3f4; color:var(--ink); box-shadow:none; }
.tab.active .rank-circle { background:var(--blue); color:#fff; }
.rank-circle {
  min-width:38px;
  height:22px;
  border-radius:999px;
  background:#f1f3f4;
  color:var(--ink);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10pt;
  padding:0 8px;
}
.icon-btn, .btn {
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  border-radius:999px;
  min-height:32px;
  padding:6px 12px;
  cursor:pointer;
  font-weight:400;
}
.icon-btn { width:38px; padding:0; font-size:10pt; }
.btn:hover, .icon-btn:hover { background:#f1f3f4; }
.btn.primary { background:#202124; border-color:#202124; color:#fff; }
.btn.primary:hover { background:#3c4043; }
.btn.danger { color:var(--red); }
.btn:active, .icon-btn:active, .tab:active { transform:scale(.98); }
.table-container { display:none; }
.table-container.active { display:block; }
.tracker-workspace {
  display:grid;
  grid-template-columns:minmax(680px, min(78vw, 940px)) minmax(280px, 360px);
  gap:14px;
  align-items:start;
  padding:14px;
  background:#fff;
}
.tracker-card {
  background:var(--card);
  border:1px solid var(--soft-line);
  border-radius:18px;
  box-shadow:none;
  overflow:hidden;
  min-width:0;
}
.table-scroll { width:100%; overflow-x:auto; background:#fff; }
.mobile-day-picker { display:none; }
table { width:100%; border-collapse:collapse; table-layout:fixed; min-width:0; }
tbody tr { min-height:30px; }
th, td {
  border-bottom:1px solid var(--soft-line);
  text-align:center;
  padding:3px 2px;
  font-size:10pt;
  height:30px;
  vertical-align:middle;
  user-select:none;
}
th:first-child, td:first-child { width:120px; text-align:left; padding-left:8px; padding-right:5px; }
th { color:var(--muted); font-size:9pt; font-weight:700; background:#fff; text-transform:uppercase; letter-spacing:0; }
th.current-day { color:#fff; background:var(--blue); border-radius:999px; }
.day-head {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:default;
  min-height:22px;
  width:100%;
  position:relative;
}
.note-dots {
  position:absolute;
  right:1px;
  display:inline-flex;
  gap:2px;
  min-width:18px;
  justify-content:flex-end;
}
.note-dot { width:5px; height:5px; border-radius:50%; display:inline-block; }
.note-dot.other { background:var(--blue); }
.note-dot.good { background:var(--green); }
.note-dot.bad { background:var(--red); }
.day-short { display:none; }
.category-label {
  width:100%;
  border:0;
  background:transparent;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  color:var(--ink);
  font-weight:400;
  cursor:pointer;
}
.category-name { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:100%; font-size:10pt; line-height:1; }
.category-label:active { color:var(--blue); }
input[type="checkbox"] {
  appearance:none;
  -webkit-appearance:none;
  width:38px;
  height:20px;
  border-radius:999px;
  border:0;
  background:#d1d1d6;
  position:relative;
  vertical-align:middle;
  cursor:pointer;
}
input[type="checkbox"]::before {
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  left:2px;
  top:2px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,.18);
  transition:transform .18s ease;
}
input[type="checkbox"]:checked { background:#5f6368; }
input[type="checkbox"][data-negative="true"]:checked { background:#5f6368; }
input[type="checkbox"]:checked::before { transform:translateX(18px); }
input[type="number"], input[type="text"], select, textarea {
  width:100%;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  color:var(--ink);
  outline:0;
}
input[type="number"] {
  width:38px;
  height:22px;
  text-align:center;
  padding:2px;
  font-size:10pt;
  appearance:textfield;
  -moz-appearance:textfield;
  cursor:text;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance:none;
  margin:0;
}
input:focus, textarea:focus, select:focus { border-color:#9aa0a6; box-shadow:0 0 0 3px rgba(60,64,67,.10); }
.total-row td {
  background:#fff;
  font-weight:400;
  border-top:1px solid #c7c7cc;
  border-bottom:0;
  height:30px;
  padding-top:4px;
  padding-bottom:4px;
}
.group-start td {
  border-top:2px solid #c7c7cc;
}
.group-start:first-child td {
  border-top:0;
}
.work-grid {
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin:0;
  min-width:0;
}
.panel {
  background:var(--card);
  border:1px solid var(--soft-line);
  border-radius:18px;
  box-shadow:none;
  padding:10px;
}
.panel-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:6px; color:var(--muted); font-size:10pt; font-weight:400; }
.panel-actions { display:flex; gap:5px; align-items:center; }
.panel-add {
  width:28px;
  height:28px;
  border:0;
  border-radius:999px;
  background:#f1f3f4;
  border:1px solid transparent;
  color:var(--ink);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:10pt;
  line-height:1;
  font-weight:400;
}
.panel-add:active { transform:scale(.96); }
.panel-edit.active { background:#202124; color:#fff; border-color:#202124; }
.entry-row {
  display:grid;
  grid-template-columns:86px 1fr auto;
  gap:7px;
  align-items:center;
  margin-bottom:8px;
}
.entry-row.collapsed, .log-compose.collapsed { display:none; }
.log-compose {
  display:grid;
  grid-template-columns:68px 74px minmax(120px,1fr) minmax(120px,1fr) auto;
  gap:6px;
  align-items:center;
  margin-bottom:8px;
}
.entry-row input, .entry-row select, .log-compose input, .log-compose select { min-height:28px; padding:4px 7px; font-size:10pt; }
.task-list { display:grid; gap:7px; }
.task-item {
  display:grid;
  grid-template-columns:auto 1fr auto auto auto;
  gap:8px;
  align-items:center;
  min-height:34px;
  padding:7px;
  border:1px solid var(--soft-line);
  border-radius:16px;
  background:#fff;
}
.task-item.done { opacity:.6; }
.day-chip {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
  height:24px;
  padding:0 9px;
  border-radius:999px;
  background:#f8fafd;
  border:1px solid var(--soft-line);
  color:var(--muted);
  font-size:10pt;
  font-weight:400;
}
.task-text { min-width:0; font-size:10pt; overflow-wrap:anywhere; }
.task-toggle { flex:0 0 auto; }
.mini-action {
  border:0;
  background:transparent;
  color:var(--muted);
  font-weight:400;
  cursor:pointer;
  width:30px;
  height:30px;
  padding:0;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10pt;
}
.mini-action:hover { background:rgba(118,118,128,.12); }
.mini-action.delete { color:var(--red); }
.empty-state { color:var(--muted); padding:8px; font-size:10pt; }
.log-list { display:grid; gap:7px; }
.log-item {
  display:grid;
  gap:3px;
  padding:8px;
  border:1px solid var(--soft-line);
  border-radius:16px;
  background:#fff;
}
.log-item.good .day-chip { background:#e8f7ee; color:#1b7f3a; border-color:#ccebd6; }
.log-item.bad .day-chip { background:#fdebea; color:#b42318; border-color:#f8d0cd; }
.log-main { display:grid; grid-template-columns:auto 1fr auto auto; gap:7px; align-items:center; }
.log-copy { min-width:0; font-size:10pt; line-height:1.2; overflow-wrap:anywhere; }
.log-outcome { color:var(--muted); font-size:10pt; overflow-wrap:anywhere; }
.menu-wrap { position:relative; }
.menu-button {
  width:36px;
  min-width:36px;
  height:36px;
  min-height:36px;
  padding:0;
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  line-height:0;
}
.menu-button span {
  width:18px;
  height:2px;
  flex:0 0 2px;
  border-radius:999px;
  background:var(--ink);
  display:block;
}
.overflow-menu {
  display:none;
  position:absolute;
  left:0;
  top:calc(100% + 6px);
  min-width:150px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  box-shadow:0 8px 24px rgba(60,64,67,.18);
  z-index:10;
}
.overflow-menu.open { display:grid; gap:2px; }
.menu-section {
  display:none;
  position:absolute;
  left:calc(100% - 2px);
  top:0;
  min-width:172px;
  gap:2px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  box-shadow:0 8px 24px rgba(60,64,67,.18);
}
.menu-section.open { display:grid; }
#goal-folder-items { top:6px; }
#settings-folder-items { top:42px; }
#tracker-settings-folder-items { top:66px; }
.menu-item {
  border:0;
  background:#fff;
  color:var(--ink);
  min-height:34px;
  border-radius:10px;
  padding:5px 9px;
  text-align:left;
  cursor:pointer;
}
.menu-item:hover { background:#f1f3f4; }
.menu-item.danger { color:var(--red); }
.screen-view { display:none; }
.screen-view.active { display:block; }
.screen-bar {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}
#screen-title { color:var(--muted); }
#screen-title:empty { display:none; }
#screen-content > .modal-content {
  width:100%;
  max-height:none;
  box-shadow:none;
  border:0;
  border-radius:0;
  background:#fff;
}
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
  align-items:center;
  justify-content:center;
  padding:14px;
  z-index:20;
}
.modal-content {
  width:min(1040px,96vw);
  max-height:96vh;
  overflow:auto;
  background:var(--card);
  border-radius:24px;
  box-shadow:0 18px 50px rgba(60,64,67,.24);
  padding:16px;
}
.modal-title { margin:0 0 12px; font-size:10pt; font-weight:400; }
.modal-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.modal-toolbar select { width:auto; min-width:130px; padding:6px 28px 6px 9px; }
.field { display:grid; gap:5px; margin-bottom:10px; }
.field label { color:var(--muted); font-size:10pt; font-weight:400; }
.field textarea { min-height:72px; resize:vertical; padding:9px; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap; margin-top:12px; }
.auth-screen {
  min-height:100vh;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.auth-card {
  width:min(380px,100%);
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
}
.setup-check {
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  margin:6px 0 2px;
}
.setup-check input[type="checkbox"] { flex:0 0 auto; }
#category-modal .modal-content { width:min(1320px,98vw); }
.category-editor { display:grid; gap:0; min-width:1120px; max-height:68vh; overflow:auto; }
.category-header, .category-row {
  display:grid;
  grid-template-columns:34px 104px minmax(210px,1fr) 92px 92px 78px 68px 68px 74px 78px 96px 34px;
  gap:8px;
  align-items:center;
}
.category-header {
  position:sticky;
  top:0;
  z-index:2;
  padding:0 0 7px;
  background:#fff;
  color:var(--muted);
  font-weight:700;
  border-bottom:1px solid var(--soft-line);
}
.category-row { padding:7px 0; border-bottom:1px solid var(--line); }
.drag-handle { cursor:grab; color:var(--muted); text-align:center; user-select:none; }
.category-row.dragging { opacity:.45; }
.move-pair { display:flex; gap:4px; }
.move-category { width:28px; min-height:28px; padding:0; }
.category-row input, .category-row select { min-height:30px; padding:5px 8px; min-width:0; }
.category-row input[type="number"] { width:100%; min-width:82px; }
.category-row textarea {
  min-height:44px;
  padding:5px 8px;
  resize:vertical;
  overflow-wrap:anywhere;
}
.category-row .remove-category { color:var(--red); padding:0; }
.category-detail { color:var(--muted); line-height:1.4; margin:0; white-space:pre-wrap; }
#category-detail-modal .modal-content { width:min(430px,92vw); }
.category-detail-form { display:grid; gap:8px; }
.category-detail-form textarea { min-height:108px; padding:8px; resize:vertical; }
.category-detail-meta { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.summary-table-wrap { overflow-x:auto; border:1px solid var(--soft-line); border-radius:18px; background:#fff; }
.summary-table { width:max-content; min-width:0; table-layout:fixed; }
.summary-table th:first-child, .summary-table td:first-child { width:116px; min-width:116px; max-width:116px; }
.summary-table td, .summary-table th { width:84px; min-width:84px; max-width:84px; padding:6px 8px; white-space:nowrap; }
.summary-empty { color:var(--muted); padding:12px; }
.summary-goal-blue { background:#9fd0ff; color:#003b73; }
.summary-goal-green { background:#a7e8bd; color:#0b4f24; }
.summary-goal-yellow { background:#ffe27a; color:#5c4300; }
.summary-goal-red { background:#ffaaa4; color:#7a120b; }
.summary-controls { display:grid; grid-template-columns:auto auto auto auto 1fr auto; gap:8px; align-items:center; margin-bottom:10px; }
.summary-controls select, .summary-controls input { min-width:112px; padding:6px 9px; }
.summary-refresh { justify-self:end; width:30px; min-height:30px; border-radius:999px; padding:0; }
.calc-value {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:22px;
  color:var(--muted);
  user-select:none;
}
.goal-progress-cell { color:var(--muted); width:50px; white-space:nowrap; }
.goal-percent {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:38px;
  height:20px;
  border-radius:999px;
  padding:0 5px;
}
@media(max-width:760px) {
  body { padding:6px; overflow-x:hidden; }
  .top-bar { align-items:stretch; flex-wrap:wrap; }
  .top-controls { width:100%; }
  .site-container { width:100%; min-width:0; }
  .tab-container { grid-template-columns:repeat(6,minmax(0,1fr)); gap:2px; padding:0; height:36px; }
  .tab { flex-direction:row; gap:2px; padding:5px 1px; font-size:10pt; height:34px; min-height:34px; }
  .kid-name { font-size:0; }
  .kid-name::first-letter { font-size:12pt; }
  .rank-circle { height:18px; min-width:25px; padding:0 4px; font-size:10pt; }
  .tracker-workspace { grid-template-columns:1fr; gap:10px; padding:8px; }
  .work-grid { grid-template-columns:1fr; }
  .mobile-day-picker {
    display:none;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:2px;
    padding:4px;
    border-bottom:1px solid var(--soft-line);
    background:#fff;
  }
  .day-filter {
    border:0;
    border-radius:8px;
    background:#fff;
    color:var(--muted);
    min-height:26px;
    padding:0;
    font-size:10pt;
    font-weight:400;
    cursor:pointer;
  }
  .day-filter.active { background:#f5f5f7; color:var(--ink); }
  .entry-row { grid-template-columns:72px 1fr auto; }
  .log-compose { grid-template-columns:58px 64px minmax(0,1fr) auto; gap:5px; }
  .log-compose input[id$="-log-outcome"] { grid-column:3 / 4; }
  .log-compose button { grid-column:4 / 5; grid-row:2; }
  .task-item { grid-template-columns:auto 1fr auto; }
  .task-item .mini-action { grid-column:auto; }
  .log-main { grid-template-columns:auto 1fr auto auto; }
  .table-scroll { overflow-x:hidden; }
  table { min-width:0; width:100%; }
  .hidden-day { display:table-cell; }
  tbody tr, th,td { height:26px; min-height:26px; }
  th,td { padding:2px 0; font-size:9pt; }
  th:first-child, td:first-child { width:68px; padding-left:4px; padding-right:2px; }
  .category-name { font-size:9pt; }
  .day-head { gap:1px; min-height:19px; }
  .day-full { display:none; }
  .day-short { display:inline; }
  .note-dots { right:0; gap:1px; min-width:8px; }
  .note-dot { width:4px; height:4px; }
  input[type="checkbox"] { width:28px; height:16px; }
  input[type="checkbox"]::before { width:12px; height:12px; top:2px; }
  input[type="checkbox"]:checked::before { transform:translateX(12px); }
  input[type="number"] { width:34px; height:18px; font-size:9pt; padding:1px; }
  .calc-value { width:26px; height:18px; font-size:9pt; }
  .goal-progress-cell { width:38px; }
  .goal-percent { min-width:32px; height:18px; padding:0 3px; font-size:9pt; }
  .category-row { grid-template-columns:1fr; }
  .category-editor { min-width:0; }
  .move-pair { justify-content:flex-start; }
  .category-row .remove-category { width:100%; }
  .summary-controls { grid-template-columns:1fr 1fr; }
.modal-content { border-radius:16px; }
}

/* Google/Apple polish layer */
#kid-views { background:#fff; }
.menu-button { border:0; background:transparent; color:var(--muted); gap:4px; justify-content:center; }
.menu-button:hover { background:#f1f3f4; }
.menu-button span { background:#3c4043; display:block; flex:0 0 auto; height:2px; margin:0; transform:none; }
.day-head { border-radius:999px; }

function getYearWeek(date = new Date()) {
  const tmpDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = tmpDate.getUTCDay() || 7;
  tmpDate.setUTCDate(tmpDate.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(tmpDate.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((tmpDate - yearStart) / 86400000) + 1) / 7);
  return `${tmpDate.getUTCFullYear()}-W${weekNo}`;
}

function combinedGood(data = {}) {

function dayOptions(selected = todayIndex) {

function makeId(prefix) {

function memberIdFromName(name = "Member") {

function friendlyFirebaseError(error, fallback = "Something went wrong.") {
  const code = error?.code || "";
  if (code === "auth/email-already-in-use") return "That email already has an account. Use Sign In.";
  if (code === "auth/invalid-email") return "Enter a valid email address.";
  if (code === "auth/weak-password") return "Use a password with at least 6 characters.";
  if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-login-credentials") return "Email or password is incorrect.";
  if (code === "auth/operation-not-allowed") return "Email/password sign-in is not enabled in Firebase Authentication.";
  if (code === "permission-denied") return "Signed in, but Firestore rules blocked account or household data. Temporarily allow legacy migration or deploy the household rules.";
  return error?.message || fallback;
}

function promptDay(currentDay) {
  const entered = prompt("Day number, 1-7:", String(Number(currentDay) + 1));
  if (entered === null) return null;
  const day = Number(entered) - 1;
  return Number.isInteger(day) && day >= 0 && day < days.length ? day : Number(currentDay);
}

function formatTodayLabel() {
  return new Date().toLocaleDateString(undefined, {month:"short", day:"numeric"});
}

function previousWeekKey(weekKey = currentWeek) {
  const date = dateFromWeekKey(weekKey) || new Date();
  date.setUTCDate(date.getUTCDate() - 7);
  return getYearWeek(date);
}

function normalizeCategory(category, index) {
  const defaults = DEFAULT_CATEGORY_MAP[category.key] || {};
  const rawLabel = (category.label || defaults.label || category.key || `Row ${index + 1}`).trim();
  const label = defaults.label && !category.details ? defaults.label : rawLabel;
  const key = (category.key || label).trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase() || `row-${index + 1}`;
  const kind = ["check","number","calculated"].includes(category.kind) ? category.kind : "check";
  return {
    key,
    label,
    details:(category.details || defaults.details || label).trim(),
    kind,
    amount:Number(category.amount || 0),
    group:(category.group || defaults.group || "").trim(),
    goal:Number(category.goal ?? defaults.goal ?? 0),
    goalType:category.goalType === "max" ? "max" : "min",
    goalPeriod:category.goalPeriod === "daily" ? "daily" : "weekly",
    showProgress:category.showProgress === true || category.showTarget === true || category.showWeekly === true,
    showSummary:category.showSummary !== false,
    formula:(category.formula || "").trim()
  };
}

function cloneCategories(list = DEFAULT_CATEGORIES) {
  return list.map((category, index) => normalizeCategory({...category}, index));
}

function categoriesForKid(kid) {

async function createHousehold(name, options = {}) {
  const householdDoc = db.collection("households").doc();
  householdId = householdDoc.id;
  const now = new Date();
  const householdPayload = {
    name:name.trim() || "My Household",
    scoringMode:options.scoringMode || "money",
    weeklyResetDay:Number(options.weeklyResetDay ?? 1),
    createdBy:currentUser.uid,
    createdAt:now,
    updatedAt:now,
    legacyMigrated:false
  };
  await householdDoc.set(householdPayload);
  await householdDoc.collection("userRoles").doc(currentUser.uid).set({
    role:"owner",
    email:currentUser.email || "",
    createdAt:now
  });
  await db.collection("users").doc(currentUser.uid).set({
    activeHouseholdId:householdId,
    createdAt:now,
    updatedAt:now
  }, {merge:true});
  await Promise.all(seedMembersFromNames().map(member => householdDoc.collection("members").doc(member.id).set({...member, createdAt:now, updatedAt:now})));
  await trackerSettingsRef().set({categories:cloneCategories(DEFAULT_CATEGORIES), categoriesByKid:{}, goalBands, updatedAt:now}, {merge:true});
  householdData = householdPayload;
  return householdId;
}

}

async function copyCollectionDocs(sourceCollectionRef, targetCollectionRef) {
  const snap = await sourceCollectionRef.get();
  await Promise.all(snap.docs.map(doc => targetCollectionRef.doc(doc.id).set(doc.data(), {merge:true})));
}

async function migrateLegacyData() {
  try {
    const legacySettings = await db.collection("settings").doc("tracker").get();
    if (legacySettings.exists) await trackerSettingsRef().set({...legacySettings.data(), migratedAt:new Date()}, {merge:true});
    const weeksSnap = await db.collection("weeks").get();
    await Promise.all(weeksSnap.docs.map(async weekDoc => {
      const targetWeek = weekRef(weekDoc.id);
      await targetWeek.set(weekDoc.data(), {merge:true});
      await Promise.all(["chores", "notes", "tasks", "logs", "notepads"].map(name => copyCollectionDocs(weekDoc.ref.collection(name), targetWeek.collection(name))));
    }));
    await householdRef().set({legacyMigrated:true, updatedAt:new Date()}, {merge:true});
  } catch (error) {
    console.warn("Legacy migration skipped or incomplete.", error);
  }
}

async function loadHouseholdMembers() {
  const snap = await householdCollection("members").orderBy("order", "asc").get();
  householdMembers = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
  if (!householdMembers.length) {
    householdMembers = seedMembersFromNames();
    await Promise.all(householdMembers.map(member => householdCollection("members").doc(member.id).set({...member, createdAt:new Date(), updatedAt:new Date()}, {merge:true})));
  }
  kids = householdMembers.filter(member => !member.archived).sort((a, b) => Number(a.order || 0) - Number(b.order || 0)).map(member => member.id);
  if (!kids.length) {
    const fallback = householdMembers[0] || seedMembersFromNames(["Member"])[0];
    kids = [fallback.id];
  }
  if (!kids.includes(activeKid)) activeKid = kids[0];
  if (!kids.includes(categoryEditorKid)) categoryEditorKid = kids[0];
}

async function loadCategories() {
  const doc = await trackerSettingsRef().get();
  const data = doc.exists ? doc.data() : {};
  if (Array.isArray(data.goalBands) && data.goalBands.length) goalBands = data.goalBands.map(normalizeGoalBand);
  if (data.categoriesByKid && typeof data.categoriesByKid === "object") {
    kids.forEach(kid => {
      const saved = Array.isArray(data.categoriesByKid[kid]) && data.categoriesByKid[kid].length ? data.categoriesByKid[kid] : data.categories;
      categoriesByKid[kid] = cloneCategories((saved || DEFAULT_CATEGORIES).filter(category => category.key !== "other"));
    });
    categories = cloneCategories(categoriesByKid[kids[0]]);
  } else if (Array.isArray(data.categories) && data.categories.length) {
    setAllKidsCategories(data.categories.filter(category => category.key !== "other"));
  } else {

function formatRawValue(value) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "0";
  return Number.isInteger(number) ? String(number) : number.toFixed(1);
}

function formulaName(category) {
  return String(category.key || category.label || "").replace(/[^a-z0-9_]+/gi, "_").replace(/^_+|_+$/g, "") || "value";
}

function formulaAliases(category) {
  const names = new Set();
  [category.key, category.label].filter(Boolean).forEach(value => {
    const alias = formulaName({key:value});
    names.add(alias);
    names.add(alias.toLowerCase());
  });
  return [...names].filter(name => /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name));
}

function escapeRegExp(text = "") {
  return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function formulaReferencesCategory(formula = "", category) {
  const text = String(formula || "");
  if (!text.trim()) return false;
  const quotedNames = [category.key, category.label].filter(Boolean);
  if (quotedNames.some(name => new RegExp(`(["'])${escapeRegExp(name)}\\1`, "i").test(text))) return true;
  return formulaAliases(category).some(alias => new RegExp(`\\b${escapeRegExp(alias)}\\b`).test(text));
}

function categoryDayValue(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") {
    if (!categoryDayHasEntry(kid, category, dayIndex, data, stack)) return 0;
    return evaluateFormula(category, kid, dayIndex, data, stack);
  }
  if (data) {
    const value = data[`${dayIndex}-${category.key}`];
    return category.kind === "number" ? Number(value || 0) : value ? 1 : 0;
  }
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return 0;
  return category.kind === "number" ? Number(input.value || 0) : input.checked ? 1 : 0;
}

function categoryDayHasEntry(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") {
    if (stack.has(category.key)) return false;
    const nextStack = new Set(stack);
    nextStack.add(category.key);
    const referenced = categoriesForKid(kid).filter(other => {
      if (other.key === category.key) return false;
      return formulaReferencesCategory(category.formula, other);
    });
    const dependencies = referenced.length ? referenced : [];
    return dependencies.length > 0 && dependencies.every(other => categoryDayHasEntry(kid, other, dayIndex, data, nextStack));
  }
  if (data) {
    const dataKey = `${dayIndex}-${category.key}`;
    if (!Object.prototype.hasOwnProperty.call(data, dataKey)) return false;
    if (category.kind === "number") return data[dataKey] !== "" && data[dataKey] !== null && data[dataKey] !== undefined;
    return true;
  }
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return false;
  return category.kind === "number" ? input.value !== "" : true;
}

function evaluateFormula(category, kid, dayIndex, data = null, stack = new Set()) {
  const formula = (category.formula || "").trim();
  if (!formula || stack.has(category.key)) return 0;
  const nextStack = new Set(stack);
  nextStack.add(category.key);
  const scope = {};
  const labelValues = {};
  categoriesForKid(kid).forEach(other => {
    if (other.key === category.key) return;
    if (formulaReferencesCategory(formula, other) && !categoryDayHasEntry(kid, other, dayIndex, data, nextStack)) return;
    const value = categoryDayValue(kid, other, dayIndex, data, nextStack);
    formulaAliases(other).forEach(alias => { scope[alias] = value; });
    [other.key, other.label].filter(Boolean).forEach(name => {
      labelValues[String(name).toLowerCase()] = value;
    });
  });
  try {
    const expression = formula.replace(/(["'])(.*?)\1/g, (match, quote, label) => {
      const value = labelValues[String(label).toLowerCase()];
      return Number.isFinite(Number(value)) ? String(value) : match;
    });
    const names = Object.keys(scope);
    const values = Object.values(scope);
    const result = Function(...names, `"use strict"; return (${expression});`)(...values);
    const number = Number(result);
    return Number.isFinite(number) ? number : 0;
  } catch (error) {
    return 0;
  }
}

function goalPercent(category, value, count = 1) {
  const goal = Number(category.goal || 0);
  const number = goalComparisonValue(category, value, count);
  if (!Number.isFinite(goal) || goal <= 0) {
    if (category.goalType === "max") return number <= 0 ? 100 : 0;
    return number > 0 ? 100 : 0;
  }
  return Math.round((number / goal) * 100);
}

function goalComparisonValue(category, value, count = 1) {
  const number = Number(value || 0);
  const divisor = Math.max(Number(count || 1), 1);
  return number / divisor;
}

function updateTotals() {
  const totalsByKid = {};
  kids.forEach(kid => {
    let kidTotal = 0;
    const weeklyRaw = {};
    const weeklyCounts = {};
    days.forEach((day, i) => {
      let dayTotal = 0;
      categoriesForKid(kid).forEach(category => {
        const raw = categoryDayValue(kid, category, i);
        if (category.kind === "calculated") {
          const calcNode = document.getElementById(`${kid}-calc-${category.key}-${i}`);
          if (calcNode) calcNode.textContent = categoryDayHasEntry(kid, category, i) ? formatRawValue(raw) : "";
        }
        const hasEntry = categoryDayHasEntry(kid, category, i);
        if (hasEntry) {
          weeklyRaw[category.key] = (weeklyRaw[category.key] || 0) + raw;
          weeklyCounts[category.key] = (weeklyCounts[category.key] || 0) + 1;
          dayTotal += raw * category.amount;
        }
      });
      kidTotal += dayTotal;
      document.getElementById(`${kid}-total-${i}`).textContent = dollars(dayTotal);
    });
    totalsByKid[kid] = kidTotal;
    categoriesForKid(kid).forEach(category => {
      const weekNode = document.getElementById(`${kid}-week-${category.key}`);
      if (weekNode) {
        if (category.showProgress && (weeklyCounts[category.key] || 0) > 0) {
          const value = weeklyRaw[category.key] || 0;
          const count = category.goalPeriod === "daily" ? weeklyCounts[category.key] || 1 : 1;
          weekNode.innerHTML = `<span class="goal-percent ${goalClass(category, value, count)}">${goalPercent(category, value, count)}%</span>`;
        } else {
          weekNode.textContent = "";
        }
      }
    });
  });
  updateNameMetricColors(totalsByKid);
}

function updateNameMetricColors(totalsByKid = {}) {
  const values = kids.map(kid => Number(totalsByKid[kid] || 0));
  const min = values.length ? Math.min(...values) : 0;
  const max = values.length ? Math.max(...values) : 0;
  kids.forEach(kid => {
    const node = document.getElementById(`rank-${kid}`);
    if (!node) return;
    const value = Number(totalsByKid[kid] || 0);
    node.textContent = dollars(value);
    node.classList.remove("summary-goal-blue", "summary-goal-green", "summary-goal-yellow", "summary-goal-orange", "summary-goal-red", "summary-goal-gray");
    node.classList.add(overallSummaryClass(value, min, max));
    node.style.background = "";
    node.style.color = "";
    node.style.borderColor = "";
  });
}

function scoreDataForKid(kid, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    categoriesForKid(kid).forEach(category => {
      total += categoryDayValue(kid, category, i, data) * category.amount;
    });
  });
  return total;
}

function categoryRawValue(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    if (categoryDayHasEntry(kid, category, i, data)) total += categoryDayValue(kid, category, i, data);
  });
  return total;
}

function categoryEntryCount(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    if (categoryDayHasEntry(kid, category, i, data)) total += 1;
  });
  return total;
}

function dateFromWeekKey(weekKey) {
  const match = String(weekKey).match(/^(\d{4})-W(\d{1,2})$/);
  if (!match) return null;
  const year = Number(match[1]);
  const week = Number(match[2]);
  const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
  const day = simple.getUTCDay() || 7;
  simple.setUTCDate(simple.getUTCDate() + 1 - day);
  return simple;
}

function bucketLabel(weekKey, bucket) {
  const date = dateFromWeekKey(weekKey);
  if (!date) return weekKey;
  if (bucket === "year") return String(date.getUTCFullYear());
  if (bucket === "month") return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`;
  return weekKey;
}

function periodStart(date, bucket) {
  const copy = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
  if (bucket === "year") copy.setUTCMonth(0, 1);
  if (bucket === "month") copy.setUTCDate(1);
  if (bucket === "week") {
    const day = copy.getUTCDay() || 7;
    copy.setUTCDate(copy.getUTCDate() + 1 - day);
  }
  copy.setUTCHours(0, 0, 0, 0);
  return copy;
}

async function summaryWeekKeys(bucket = "week", count = 12) {
  const snap = await householdCollection("weeks").orderBy("timestamp", "desc").get();
  const keys = new Set([currentWeek]);
  snap.forEach(doc => keys.add(doc.id));
  const parsed = [...keys].map(key => ({key, date:dateFromWeekKey(key)})).filter(item => item.date);
  const starts = [...new Set(parsed.map(item => periodStart(item.date, bucket).toISOString()))].sort().reverse().slice(0, Math.max(Number(count || 12), 1));
  const allowed = new Set(starts);
  return parsed.filter(item => allowed.has(periodStart(item.date, bucket).toISOString())).map(item => item.key).sort().reverse();
}

function formatSummaryMetric(value) {
  const mode = householdData?.scoringMode || "money";
  const rounded = Math.round(Number(value || 0));
  if (mode === "money") return dollars(value);
  if (mode === "percent") return `${rounded}%`;
  if (mode === "completion") return String(rounded);
  return `${rounded} pts`;
}

async function fetchOverallSummaryRows(bucket, count) {
  const weekKeys = await summaryWeekKeys(bucket, count);
  const labels = [...new Set(weekKeys.map(weekKey => bucketLabel(weekKey, bucket)))].sort().reverse().slice(0, Math.max(Number(count || 12), 1));
  const rows = kids.map(kid => ({kid, values:Object.fromEntries(labels.map(label => [label, null]))}));
  await Promise.all(weekKeys.flatMap(weekKey => rows.map(async row => {
    const label = bucketLabel(weekKey, bucket);
    if (!labels.includes(label)) return;
    const choresDoc = await weekRef(weekKey).collection("chores").doc(row.kid).get();
    const score = scoreSummaryDataForKid(row.kid, choresDoc.exists ? choresDoc.data() : {});
    if (score !== null) row.values[label] = (row.values[label] || 0) + score;
  })));
  return {labels, rows};
}

function overallSummaryClass(value, min, max) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "";
  const range = max - min;
  const ratio = range > 0 ? (number - min) / range : .65;
  if (ratio >= .75) return "summary-goal-green";
  if (ratio >= .5) return "summary-goal-yellow";
  if (ratio >= .25) return "summary-goal-orange";
  return "summary-goal-red";
}

function renderOverallSummaryRows(summary) {
  let head = `<tr><th>Person</th>`;
  summary.labels.forEach(label => { head += `<th>${label}</th>`; });
  head += `</tr>`;
  const values = summary.rows.flatMap(row => summary.labels.map(label => row.values[label])).filter(value => value !== null && Number.isFinite(Number(value)));
  const min = values.length ? Math.min(...values.map(Number)) : 0;
  const max = values.length ? Math.max(...values.map(Number)) : 0;
  const body = summary.rows.map(row => {
    let html = `<tr><td>${escapeHtml(memberLabel(row.kid))}</td>`;
    summary.labels.forEach(label => {
      const value = row.values[label];
      html += value === null ? `<td></td>` : `<td class="${overallSummaryClass(value, min, max)}">${formatSummaryMetric(value)}</td>`;
    });
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

async function fetchDetailedSummary(kid, bucket, count) {
  const weekKeys = await summaryWeekKeys(bucket, count);
  const buckets = {};
  await Promise.all(weekKeys.map(async weekKey => {
    const label = bucketLabel(weekKey, bucket);
    if (!buckets[label]) buckets[label] = {weeks:new Set(), values:{}};
    buckets[label].weeks.add(weekKey);
    const choresDoc = await weekRef(weekKey).collection("chores").doc(kid).get();
    const data = choresDoc.exists ? choresDoc.data() : {};
    categoriesForKid(kid).forEach(category => {
      buckets[label].values[category.key] = (buckets[label].values[category.key] || 0) + categoryRawValue(kid, category, data);
      buckets[label].values[`${category.key}__count`] = (buckets[label].values[`${category.key}__count`] || 0) + categoryEntryCount(kid, category, data);
    });
  }));
  return {labels:Object.keys(buckets).sort().reverse().slice(0, Math.max(Number(count || 12), 1)), buckets};
}

function renderDetailedSummary(kid, detail) {
  const categories = summaryCategoriesForKid(kid);
  let head = `<tr><th>Item</th><th>Period</th><th>Type</th><th>Goal</th>`;
  detail.labels.forEach(label => { head += `<th>${label}</th>`; });
  head += `</tr>`;
  let previousGroup = "";
  const body = categories.map(category => {
    const group = category.group || "";
    const groupClass = group && group !== previousGroup ? "group-start" : "";
    previousGroup = group;
    const goalType = category.goalType === "min" ? "Min" : "Max";
    const goalPeriod = category.goalPeriod === "daily" ? "D" : "W";
    let html = `<tr class="${groupClass}"><td>${escapeHtml(category.label)}</td><td>${goalPeriod}</td><td>${goalType}</td><td>${Number(category.goal || 0).toFixed(0)}</td>`;
    detail.labels.forEach(label => {
      const bucket = detail.buckets[label];
      const entryCount = bucket.values[`${category.key}__count`] || 0;
      if (entryCount === 0) {
        html += `<td></td>`;
        return;
      }
      const sum = bucket.values[category.key] || 0;
      const weeks = Math.max(bucket.weeks.size, 1);
      const count = category.goalPeriod === "daily" ? entryCount : weeks;
      const value = category.goalPeriod === "daily" ? sum / count : sum;
      const cellClass = category.goalPeriod === "daily" ? goalClass(category, value, 1, true) : goalClass(category, value, count);
      html += `<td class="${cellClass}">${value.toFixed(0)}</td>`;
    });
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}


function normalizeGoalBand(band = {}) {
  const color = ["blue", "green", "yellow", "red", "gray"].includes(band.color) ? band.color : "green";
  return {threshold:Number(band.threshold || 0), color};
}

function goalBandPercent(category, value, count = 1, valueIsNormalized = false) {
  const goal = Number(category.goal || 0);
  const comparisonValue = valueIsNormalized ? Number(value || 0) : goalComparisonValue(category, value, count);
  if (!Number.isFinite(goal) || goal <= 0) return comparisonValue > 0 ? 150 : 100;
  if (category.goalType === "max") {
    if (comparisonValue <= 0) return 150;
    return Math.round((goal / comparisonValue) * 100);
  }
  return Math.round((comparisonValue / goal) * 100);
}

function goalBandClass(category, value, count = 1, valueIsNormalized = false) {
  const percent = goalBandPercent(category, value, count, valueIsNormalized);
  const sorted = goalBands.map(normalizeGoalBand).sort((a, b) => Number(b.threshold) - Number(a.threshold));
  const match = sorted.find(band => percent >= Number(band.threshold));
  return `summary-goal-${match?.color || "green"}`;
}

function renderGoalBandEditor() {
  const editor = document.getElementById("goal-band-editor");
  if (!editor) return;
  editor.innerHTML = goalBands.map((band, index) => {
    const normalized = normalizeGoalBand(band);

function readGoalBandEditor() {

    threshold:row.querySelector('[data-field="threshold"]').value,
    color:row.querySelector('[data-field="color"]').value
  })).sort((a, b) => Number(b.threshold) - Number(a.threshold));
  return bands.length ? bands : [{threshold:100, color:"green"}, {threshold:0, color:"red"}];
}

function goalClass(category, value, count = 1, valueIsNormalized = false) {

  if (kind === "detailed") {

async function loadTasks(kid) {
  const doc = await weekRef(currentWeek).collection("tasks").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().items) ? doc.data().items : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    if ((data.other || "").trim()) {
      legacy.push({id:`legacy-task-${i}`, day:i, text:data.other, done:!!data.otherDone, legacy:true});
    }
  });
  tasksCache[kid] = saved.length ? saved : legacy;

async function loadLogs(kid) {
  const doc = await weekRef(currentWeek).collection("logs").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().entries) ? doc.data().entries : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    const good = combinedGood(data).trim();
    const bad = combinedBad(data).trim();
    if (good) legacy.push({id:`legacy-good-${i}`, day:i, type:"good", note:good, outcome:"", legacy:true});
    if (bad) legacy.push({id:`legacy-bad-${i}`, day:i, type:"bad", note:bad, outcome:"", legacy:true});
  });
  logsCache[kid] = saved.length ? saved : legacy;
}

async function populateWeekDropdown() {
  const select = document.getElementById("week-select");
  select.innerHTML = "";
  const weeksSnap = await householdCollection("weeks").get();
  const seen = new Set();
  weeksSnap.forEach(doc => {
    seen.add(doc.id);
  });
  seen.add(currentWeek);
  [...seen].sort((a, b) => b.localeCompare(a, undefined, {numeric:true})).forEach(weekKey => {
    select.appendChild(new Option(weekKey, weekKey, weekKey === currentWeek, weekKey === currentWeek));
  });
  select.appendChild(new Option("Add New", "__add_new__"));
}

async function ensureWeekOption(weekKey) {
  const select = document.getElementById("week-select");
  if (![...select.options].some(option => option.value === weekKey)) {
    select.prepend(new Option(weekKey, weekKey, true, true));
  }
  select.value = weekKey;
}

async function addHistoricalWeek() {
  const entered = prompt("Week to add, like 2026-W07:", previousWeekKey());
  if (entered === null) return;
  const weekKey = entered.trim().toUpperCase();
  if (!/^\d{4}-W\d{2}$/.test(weekKey)) {
    alert("Use the format YYYY-W##.");
    document.getElementById("week-select").value = currentWeek;
    return;
  }
  const existing = document.getElementById("week-select");
  if ([...existing.options].some(option => option.value === weekKey)) {
    alert("That week already exists.");
    existing.value = currentWeek;
    return;
  }
  await weekRef(weekKey).set({timestamp:new Date(), historical:true}, {merge:true});
  await populateWeekDropdown();
  await loadData(weekKey);
}

function scoreSummaryDataForKid(kid, data = {}) {
  let total = 0;
  let entries = 0;
  days.forEach((day, i) => {
    summaryCategoriesForKid(kid).forEach(category => {
      if (!categoryDayHasEntry(kid, category, i, data)) return;
      entries += 1;
      total += categoryDayValue(kid, category, i, data) * category.amount;
    });
  });
  return entries ? total : null;
}

function readCategoryEditor() {

      details:row.querySelector('[data-field="details"]').value.trim(),

      group:row.querySelector('[data-field="group"]').value.trim(),

      showProgress:row.querySelector('[data-field="showProgress"]').value === "true",
      showSummary:row.querySelector('[data-field="showSummary"]').value === "true",
      formula:row.querySelector('[data-field="formula"]').value.trim()
    };
  });
}


function statusLabel(status = "now") {
  return String(status || "now").replace(/^./, char => char.toUpperCase());
}

function taskDateLabel(date = "") {
  if (!date) return "";
  const [year, month, day] = String(date).split("-");
  if (!year || !month || !day) return date;
  return `${Number(month)}/${Number(day)}`;
}

function taskPeopleOptions(selected = "") {
  return kids.map(kid => `<option value="${escapeAttr(kid)}" ${kid === selected ? "selected" : ""}>${escapeHtml(memberLabel(kid))}</option>`).join("");
}

function taskStatusOptions(selected = "now") {
  return FAMILY_TASK_STATUSES.map(status => `<option value="${status}" ${status === selected ? "selected" : ""}>${statusLabel(status)}</option>`).join("");
}

function taskCollectionRef() {
  return householdCollection("tasks");
}

async function loadFamilyTasks() {
  const snap = await taskCollectionRef().get();
  familyTasksCache = snap.docs.map(doc => ({id:doc.id, ...doc.data()})).sort((a, b) => {
    if (!!a.completed !== !!b.completed) return a.completed ? 1 : -1;
    const statusOrder = FAMILY_TASK_STATUSES.indexOf(a.status) - FAMILY_TASK_STATUSES.indexOf(b.status);
    if (statusOrder) return statusOrder;
    return String(a.endDate || a.startDate || "9999").localeCompare(String(b.endDate || b.startDate || "9999"));
  });
}

function renderTaskFilters() {
  const people = document.getElementById("family-task-people");
  const statuses = document.getElementById("family-task-statuses");
  if (people) {
    people.innerHTML = `<button class="family-filter-pill ${familyTaskPersonFilter === "all" ? "active" : ""}" data-family-task-person="all">All</button>` + kids.map(kid => `<button class="family-filter-pill ${familyTaskPersonFilter === kid ? "active" : ""}" data-family-task-person="${escapeAttr(kid)}">${escapeHtml(memberLabel(kid))}</button>`).join("");
  }
  if (statuses) {
    statuses.innerHTML = `<button class="family-filter-pill ${familyTaskStatusFilter === "all" ? "active" : ""}" data-family-task-status="all">All</button>` + FAMILY_TASK_STATUSES.map(status => `<button class="family-filter-pill ${familyTaskStatusFilter === status ? "active" : ""}" data-family-task-status="${status}">${statusLabel(status)}</button>`).join("");
  }
}

function visibleFamilyTasks(completed = false) {
  return familyTasksCache.filter(task => {
    if (!!task.completed !== completed) return false;
    if (familyTaskPersonFilter !== "all" && task.who !== familyTaskPersonFilter) return false;
    if (!completed && familyTaskStatusFilter !== "all" && task.status !== familyTaskStatusFilter) return false;
    return true;
  });
}

function renderFamilyTaskList() {
  renderTaskFilters();
  const activeList = document.getElementById("family-task-list");
  const completedList = document.getElementById("family-completed-list");
  const completedCount = document.getElementById("family-completed-count");
  if (!activeList || !completedList) return;
  const renderRow = task => {
    const notes = Array.isArray(task.notes) ? task.notes : [];
    const noteHtml = notes.slice().reverse().map(note => `<div class="family-task-note-line">${escapeHtml(note.text || "")}</div>`).join("");
    const dateRange = taskDateLabel(task.endDate);
    const completeAction = task.completed ? `<button class="mini-action" data-reopen-family-task="${task.id}" aria-label="Reopen task">↩</button>` : `<button class="family-task-check" data-complete-family-task="${task.id}" aria-label="Complete task"></button>`;
    return `<div class="family-task-row ${task.completed ? "complete" : ""}" data-family-task-row="${task.id}">${completeAction}<div class="family-task-project">${escapeHtml(task.project || "No project")}</div><div class="family-task-title">${escapeHtml(task.title || "Untitled task")}</div><div class="family-task-meta">${escapeHtml(memberLabel(task.who || ""))}</div><div class="family-task-meta">${escapeHtml(dateRange)}</div><span class="family-task-status">${statusLabel(task.status)}</span><div class="family-task-actions"><button class="mini-action" data-edit-family-task="${task.id}" aria-label="Edit task">✎</button><button class="mini-action delete" data-delete-family-task="${task.id}" aria-label="Delete task">×</button></div><div class="family-task-notes">${noteHtml}<div class="family-task-note-add"><input type="text" placeholder="Add note" aria-label="Add note" data-family-task-note-input="${task.id}"><button class="btn" data-add-family-task-note="${task.id}">Add</button></div></div></div>`;
  };
  const active = visibleFamilyTasks(false);
  const completed = visibleFamilyTasks(true);
  activeList.innerHTML = active.length ? active.map(renderRow).join("") : `<div class="empty-state">All tasks complete. Nice work.</div>`;
  completedList.innerHTML = completed.length ? completed.map(renderRow).join("") : `<div class="empty-state">No completed tasks yet.</div>`;
  if (completedCount) completedCount.textContent = String(completed.length);
}

function resetFamilyTaskForm() {

  document.getElementById("family-task-who").innerHTML = taskPeopleOptions(familyTaskPersonFilter !== "all" ? familyTaskPersonFilter : kids[0]);
  document.getElementById("family-task-status").innerHTML = taskStatusOptions(familyTaskStatusFilter !== "all" ? familyTaskStatusFilter : "now");

}

async function addFamilyTask() {
  const title = document.getElementById("family-task-title").value.trim();
  if (!title) {
    alert("Add a task name first.");
    return;
  }
  const now = new Date();
  const doc = taskCollectionRef().doc();
  const note = document.getElementById("family-task-note").value.trim();
  const task = {
    project:document.getElementById("family-task-project").value.trim(),
    title,
    who:document.getElementById("family-task-who").value || kids[0],
    endDate:document.getElementById("family-task-end").value,
    status:document.getElementById("family-task-status").value || "now",
    completed:false,
    notes:note ? [{id:makeId("note"), text:note, createdAt:now.toISOString()}] : [],
    createdAt:now,
    updatedAt:now
  };
  try {
    await doc.set(task);
    familyTasksCache.push({id:doc.id, ...task});
    toggleFamilyTaskForm(false);
    renderFamilyTaskList();
  } catch (error) {
    console.error("Task save failed", error);
    alert("Task did not save. Make sure Firestore rules include households/{householdId}/tasks and this account belongs to the household.");
  }
}

async function completeFamilyTask(id, completed = true) {
  const patch = {completed, updatedAt:new Date()};
  if (completed) patch.completedAt = new Date();
  await taskCollectionRef().doc(id).set(patch, {merge:true});
  familyTasksCache = familyTasksCache.map(task => task.id === id ? {...task, ...patch} : task);
  renderFamilyTaskList();
}

async function addFamilyTaskNote(id) {
  const input = document.querySelector(`[data-family-task-note-input="${id}"]`);
  const text = input?.value.trim();
  if (!text) return;
  const task = familyTasksCache.find(item => item.id === id);
  if (!task) return;
  const notes = [...(Array.isArray(task.notes) ? task.notes : []), {id:makeId("note"), text, createdAt:new Date().toISOString()}];
  await taskCollectionRef().doc(id).set({notes, updatedAt:new Date()}, {merge:true});
  familyTasksCache = familyTasksCache.map(item => item.id === id ? {...item, notes} : item);
  renderFamilyTaskList();
}

async function editFamilyTask(id) {
  const task = familyTasksCache.find(item => item.id === id);
  if (!task) return;
  const title = prompt("Task:", task.title || "");
  if (title === null || !title.trim()) return;
  const project = prompt("Project:", task.project || "");
  if (project === null) return;
  const status = prompt("Status: now, next, soon, parked, waiting", task.status || "now");
  if (status === null) return;
  const normalizedStatus = FAMILY_TASK_STATUSES.includes(status.trim().toLowerCase()) ? status.trim().toLowerCase() : task.status || "now";
  const patch = {title:title.trim(), project:project.trim(), status:normalizedStatus, updatedAt:new Date()};
  await taskCollectionRef().doc(id).set(patch, {merge:true});
  familyTasksCache = familyTasksCache.map(item => item.id === id ? {...item, ...patch} : item);
  renderFamilyTaskList();
}

async function deleteFamilyTask(id) {
  if (!confirm("Delete this task?")) return;
  await taskCollectionRef().doc(id).delete();
  familyTasksCache = familyTasksCache.filter(task => task.id !== id);
  renderFamilyTaskList();
}

async function signInOrCreate(createAccount = false) {
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const staySignedIn = document.getElementById("auth-stay-signed-in").checked;
  if (!email || !password) {
    setAuthMessage("Enter an email and password.");
    return;
  }
  setAuthMessage(createAccount ? "Creating account..." : "Signing in...");
  try {
    await auth.setPersistence(staySignedIn ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
    const credential = createAccount
      ? await auth.createUserWithEmailAndPassword(email, password)
      : await auth.signInWithEmailAndPassword(email, password);
    await handleSignedInUser(credential.user);
  } catch (error) {
    setAuthMessage(friendlyFirebaseError(error, "Sign in failed."));
  }
}

async function createHouseholdFromSetup() {
  const name = document.getElementById("household-name").value.trim();
  const scoringMode = document.getElementById("household-scoring").value;
  const weeklyResetDay = document.getElementById("household-reset-day").value;
  const importLegacy = document.getElementById("household-import-legacy").checked;
  if (!name) {
    setHouseholdMessage("Name the household first.");
    return;
  }
  setHouseholdMessage("Creating household...");
  try {
    if (importLegacy && !canImportLegacy) {
      setHouseholdMessage("This account is not approved to import existing tracker data.");
      return;
    }
    firstHouseholdSetup = !importLegacy;
    await createHousehold(name, {scoringMode, weeklyResetDay});
    if (importLegacy) {
      setHouseholdMessage("Importing existing tracker data...");
      await migrateLegacyData();
    }
    await startHouseholdApp();
    if (firstHouseholdSetup) openMemberEditor();
  } catch (error) {
    setHouseholdMessage(error.message || "Could not create household.");
  }
}

document.body.addEventListener("dragstart", event => {
  const handle = event.target.closest(".drag-handle");
  if (!handle) return;
  draggedCategoryRow = handle.closest(".category-row");
  if (!draggedCategoryRow) return;
  draggedCategoryRow.classList.add("dragging");
  event.dataTransfer.effectAllowed = "move";
});
document.body.addEventListener("dragend", () => {
  draggedCategoryRow?.classList.remove("dragging");
  draggedCategoryRow = null;
});
document.body.addEventListener("dragover", event => {
  if (!draggedCategoryRow) return;
  const target = event.target.closest("#category-editor .category-row");
  if (!target || target === draggedCategoryRow) return;
  event.preventDefault();
  const rect = target.getBoundingClientRect();
  const after = event.clientY > rect.top + rect.height / 2;
  target.parentElement.insertBefore(draggedCategoryRow, after ? target.nextSibling : target);
});

        return;
      }
      if (currentUser?.uid === user.uid && householdId) return;
      await handleSignedInUser(user);
    } catch (error) {
      console.error(error);
      setAuthMessage(friendlyFirebaseError(error, "Could not load account."));
      showOnly("auth-screen");
    }
  });
};
</script>
</body>
</html>
