<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --bg:#f5f5f7;
  --card:#ffffff;
  --ink:#1d1d1f;
  --muted:#6e6e73;
  --line:#eeeeef;
  --blue:#007aff;
  --green:#34c759;
  --red:#ff3b30;
  --amber:#ffcc00;
  --shadow:none;
}
* { box-sizing:border-box; }
body {
  margin:0;
  padding:10px;
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:"Source Sans Pro","Helvetica Neue",Arial,sans-serif;
  font-size:10pt;
  font-weight:400;
}
button, input, select, textarea {
  font-family:"Source Sans Pro","Helvetica Neue",Arial,sans-serif;
  font-size:10pt;
  font-weight:400;
}
.site-container { width:min(1180px,100%); margin:0 auto; }
.top-bar { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
.top-controls {
  display:flex;
  align-items:center;
  gap:6px;
  flex:0 0 auto;
}
.top-controls select {
  width:auto;
  min-width:96px;
  height:30px;
  padding:3px 26px 3px 8px;
  font-size:12pt;
  font-weight:700;
  min-height:30px;
  border-radius:9px;
}
.tab-container {
  flex:1;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:2px;
  padding:3px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
}
.tab {
  min-width:0;
  border:0;
  border-radius:9px;
  padding:7px 6px;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-weight:400;
  white-space:nowrap;
  overflow:hidden;
}
.tab > span:first-child { min-width:0; overflow:hidden; text-overflow:ellipsis; }
.kid-name { font-size:12pt; font-weight:700; line-height:1; }
.tab.active { background:var(--blue); color:#fff; box-shadow:none; }
.tab.active .rank-circle { background:#fff; color:var(--blue); }
.rank-circle {
  min-width:38px;
  height:22px;
  border-radius:999px;
  background:var(--blue);
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10pt;
  padding:0 8px;
}
.icon-btn, .btn {
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  border-radius:10px;
  min-height:30px;
  padding:5px 9px;
  cursor:pointer;
  font-weight:400;
}
.icon-btn { width:38px; padding:0; font-size:10pt; }
.btn.primary { background:var(--ink); border-color:var(--ink); color:#fff; }
.btn.danger { color:var(--red); }
.btn:active, .icon-btn:active, .tab:active { transform:scale(.98); }
.table-container { display:none; }
.table-container.active { display:block; }
.tracker-card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.table-scroll { width:100%; overflow-x:auto; }
.mobile-day-picker { display:none; }
table { width:100%; border-collapse:collapse; table-layout:fixed; min-width:0; }
tbody tr { min-height:30px; }
th, td {
  border-bottom:1px solid var(--line);
  text-align:center;
  padding:3px 2px;
  font-size:10pt;
  height:30px;
  vertical-align:middle;
}
th:first-child, td:first-child { width:120px; text-align:left; padding-left:8px; padding-right:5px; }
th { color:var(--muted); font-size:10pt; font-weight:400; background:#fff; }
th.current-day { color:var(--blue); background:#fff; }
.day-head {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:pointer;
  min-height:22px;
  width:100%;
  position:relative;
}
.note-dots {
  position:absolute;
  right:1px;
  display:inline-flex;
  gap:2px;
  min-width:18px;
  justify-content:flex-end;
}
.note-dot { width:5px; height:5px; border-radius:50%; display:inline-block; }
.note-dot.other { background:var(--blue); }
.note-dot.good { background:var(--green); }
.note-dot.bad { background:var(--red); }
.category-label {
  width:100%;
  border:0;
  background:transparent;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  color:var(--ink);
  font-weight:400;
  cursor:pointer;
}
.category-name { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:100%; font-size:10pt; line-height:1; }
.category-label:active { color:var(--blue); }
input[type="checkbox"] {
  appearance:none;
  -webkit-appearance:none;
  width:38px;
  height:22px;
  border-radius:999px;
  border:0;
  background:#d1d1d6;
  position:relative;
  vertical-align:middle;
  cursor:pointer;
}
input[type="checkbox"]::before {
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  left:2px;
  top:2px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,.18);
  transition:transform .18s ease;
}
input[type="checkbox"]:checked { background:var(--blue); }
input[type="checkbox"][data-negative="true"]:checked { background:var(--red); }
input[type="checkbox"]:checked::before { transform:translateX(16px); }
input[type="number"], input[type="text"], select, textarea {
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:var(--ink);
  outline:0;
}
input[type="number"] {
  width:38px;
  height:22px;
  text-align:center;
  padding:2px;
  font-size:10pt;
  appearance:textfield;
  -moz-appearance:textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance:none;
  margin:0;
}
input:focus, textarea:focus, select:focus { border-color:#c7c7cc; box-shadow:none; }
.total-row td {
  background:#fff;
  font-weight:400;
  border-top:1px solid #c7c7cc;
  border-bottom:0;
  height:30px;
  padding-top:4px;
  padding-bottom:4px;
}
.group-start td {
  border-top:2px solid #c7c7cc;
}
.group-start:first-child td {
  border-top:0;
}
.work-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.panel {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:9px;
}
.panel-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:6px; color:var(--muted); font-size:10pt; font-weight:400; }
.panel-add {
  width:28px;
  height:28px;
  border:0;
  border-radius:999px;
  background:#fff;
  border:1px solid var(--line);
  color:var(--blue);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:10pt;
  line-height:1;
  font-weight:400;
}
.panel-add:active { transform:scale(.96); }
.entry-row {
  display:grid;
  grid-template-columns:86px 1fr auto;
  gap:7px;
  align-items:center;
  margin-bottom:8px;
}
.entry-row.collapsed, .log-compose.collapsed { display:none; }
.log-compose {
  display:grid;
  grid-template-columns:68px 74px minmax(120px,1fr) minmax(120px,1fr) auto;
  gap:6px;
  align-items:center;
  margin-bottom:8px;
}
.entry-row input, .entry-row select, .log-compose input, .log-compose select { min-height:28px; padding:4px 7px; font-size:10pt; }
.task-list { display:grid; gap:7px; }
.task-item {
  display:grid;
  grid-template-columns:auto 1fr auto auto auto;
  gap:8px;
  align-items:center;
  min-height:32px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}
.task-item.done { opacity:.6; }
.day-chip {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
  height:24px;
  padding:0 9px;
  border-radius:999px;
  background:#fff;
  border:1px solid var(--line);
  color:var(--muted);
  font-size:10pt;
  font-weight:400;
}
.task-text { min-width:0; font-size:10pt; overflow-wrap:anywhere; }
.status-pill {
  border:1px solid var(--line);
  border-radius:999px;
  min-height:22px;
  padding:2px 7px;
  background:#fff;
  color:var(--blue);
  font-size:10pt;
  font-weight:400;
  cursor:pointer;
}
.mini-action {
  border:0;
  background:transparent;
  color:var(--muted);
  font-weight:400;
  cursor:pointer;
  width:30px;
  height:30px;
  padding:0;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:10pt;
}
.mini-action:hover { background:rgba(118,118,128,.12); }
.mini-action.delete { color:var(--red); }
@media (hover:hover) and (pointer:fine) {
  .task-item .mini-action, .log-item .mini-action { opacity:0; pointer-events:none; transition:opacity .16s ease, background .16s ease; }
  .task-item:hover .mini-action, .task-item:focus-within .mini-action, .log-item:hover .mini-action, .log-item:focus-within .mini-action { opacity:1; pointer-events:auto; }
}
.task-item.done .status-pill { background:#fff; color:var(--green); border-color:#d9d9dc; }
.empty-state { color:var(--muted); padding:8px; font-size:10pt; }
.log-list { display:grid; gap:7px; }
.log-item {
  display:grid;
  gap:3px;
  padding:8px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}
.log-item.good .day-chip { background:#e8f7ee; color:#1b7f3a; border-color:#ccebd6; }
.log-item.bad .day-chip { background:#fdebea; color:#b42318; border-color:#f8d0cd; }
.log-main { display:grid; grid-template-columns:auto 1fr auto auto; gap:7px; align-items:center; }
.log-copy { min-width:0; font-size:10pt; line-height:1.2; overflow-wrap:anywhere; }
.log-outcome { color:var(--muted); font-size:10pt; overflow-wrap:anywhere; }
.menu-wrap { position:relative; }
.menu-button {
  width:30px;
  min-width:30px;
  height:30px;
  min-height:30px;
  padding:0;
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}
.menu-button span {
  width:14px;
  height:1px;
  border-radius:999px;
  background:var(--ink);
  display:block;
}
.overflow-menu {
  display:none;
  position:absolute;
  left:0;
  top:calc(100% + 6px);
  min-width:132px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  box-shadow:0 14px 34px rgba(0,0,0,.12);
  z-index:10;
}
.overflow-menu.open { display:grid; gap:2px; }
.menu-item {
  border:0;
  background:#fff;
  color:var(--ink);
  min-height:30px;
  border-radius:8px;
  padding:5px 9px;
  text-align:left;
  cursor:pointer;
}
.menu-item:hover { background:#f5f5f7; }
.menu-item.danger { color:var(--red); }
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
  align-items:center;
  justify-content:center;
  padding:14px;
  z-index:20;
}
.modal-content {
  width:min(1040px,96vw);
  max-height:96vh;
  overflow:auto;
  background:var(--card);
  border-radius:18px;
  box-shadow:0 18px 50px rgba(0,0,0,.2);
  padding:14px;
}
.modal-title { margin:0 0 12px; font-size:10pt; font-weight:400; }
.modal-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.modal-toolbar select { width:auto; min-width:130px; padding:6px 28px 6px 9px; }
.field { display:grid; gap:5px; margin-bottom:10px; }
.field label { color:var(--muted); font-size:10pt; font-weight:400; }
.field textarea { min-height:72px; resize:vertical; padding:9px; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap; margin-top:12px; }
#category-modal .modal-content { width:min(1320px,98vw); }
.category-editor { display:grid; gap:8px; min-width:1120px; }
.category-row {
  display:grid;
  grid-template-columns:64px 104px minmax(210px,1fr) 92px 92px 78px 68px 68px 74px 96px 34px;
  gap:8px;
  align-items:center;
}
.move-pair { display:flex; gap:4px; }
.move-category { width:28px; min-height:28px; padding:0; }
.category-row input, .category-row select { min-height:30px; padding:5px 8px; min-width:0; }
.category-row input[type="number"] { width:100%; min-width:82px; }
.category-row textarea {
  min-height:44px;
  padding:5px 8px;
  resize:vertical;
  overflow-wrap:anywhere;
}
.category-row .remove-category { color:var(--red); padding:0; }
.category-detail { color:var(--muted); line-height:1.4; margin:0; }
.summary-table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:12px; }
.summary-table { min-width:640px; }
.summary-table th:first-child, .summary-table td:first-child { width:90px; }
.summary-table td, .summary-table th { padding:6px 8px; }
.summary-empty { color:var(--muted); padding:12px; }
.summary-goal-blue { background:#eaf3ff; }
.summary-goal-green { background:#eaf8ef; }
.summary-goal-yellow { background:#fff8d8; }
.summary-goal-red { background:#fdecea; }
.summary-controls { display:grid; grid-template-columns:repeat(6,auto); gap:8px; align-items:center; margin-bottom:10px; }
.summary-controls select, .summary-controls input { min-width:118px; padding:6px 9px; }
.calc-value {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:22px;
  color:var(--muted);
}
.goal-progress-cell { color:var(--muted); width:50px; white-space:nowrap; }
.goal-percent {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:38px;
  height:20px;
  border-radius:999px;
  padding:0 5px;
}
@media(max-width:760px) {
  body { padding:8px; }
  .top-bar { align-items:stretch; flex-wrap:wrap; }
  .top-controls { width:100%; }
  .site-container { min-width:740px; }
  .tab-container { grid-template-columns:repeat(6,minmax(0,1fr)); gap:2px; padding:3px; }
  .tab { flex-direction:row; gap:2px; padding:5px 1px; font-size:10pt; }
  .kid-name { font-size:0; }
  .kid-name::first-letter { font-size:12pt; }
  .rank-circle { height:18px; min-width:25px; padding:0 4px; font-size:10pt; }
  .work-grid { grid-template-columns:1fr; }
  .mobile-day-picker {
    display:none;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:2px;
    padding:4px;
    border-bottom:1px solid var(--line);
    background:#fff;
  }
  .day-filter {
    border:0;
    border-radius:8px;
    background:#fff;
    color:var(--muted);
    min-height:26px;
    padding:0;
    font-size:10pt;
    font-weight:400;
    cursor:pointer;
  }
  .day-filter.active { background:#f5f5f7; color:var(--ink); }
  .entry-row { grid-template-columns:72px 1fr auto; }
  .log-compose { grid-template-columns:58px 64px minmax(0,1fr) auto; gap:5px; }
  .log-compose input[id$="-log-outcome"] { grid-column:3 / 4; }
  .log-compose button { grid-column:4 / 5; grid-row:2; }
  .task-item { grid-template-columns:auto 1fr auto; }
  .task-item .mini-action { grid-column:auto; }
  .log-main { grid-template-columns:auto 1fr auto auto; }
  table { min-width:0; }
  .hidden-day { display:table-cell; }
  tbody tr, th,td { height:26px; min-height:26px; }
  th,td { padding:2px 1px; font-size:10pt; }
  th:first-child, td:first-child { width:106px; padding-left:5px; padding-right:3px; }
  .category-name { font-size:10pt; }
  .day-head { gap:1px; min-height:19px; }
  input[type="checkbox"] { width:34px; height:22px; }
  input[type="checkbox"]::before { width:18px; height:18px; top:2px; }
  input[type="checkbox"]:checked::before { transform:translateX(14px); }
  input[type="number"] { width:32px; height:20px; font-size:10pt; }
  .calc-value { width:32px; height:20px; }
  .category-row { grid-template-columns:1fr; }
  .move-pair { justify-content:flex-start; }
  .category-row .remove-category { width:100%; }
  .summary-controls { grid-template-columns:1fr 1fr; }
  .modal-content { border-radius:16px; }
}
</style>
</head>
<body>
<div class="site-container">
  <div class="top-bar">
    <div class="top-controls">
      <div class="menu-wrap">
      <button class="btn menu-button" id="more-actions" aria-label="More actions"><span></span><span></span><span></span></button>
      <div class="overflow-menu" id="actions-menu">
        <button class="menu-item" id="summary-open">Summary</button>
        <button class="menu-item" id="archive-week">Archive</button>
        <button class="menu-item" id="edit-categories">Edit</button>
        <button class="menu-item danger" id="clear-week">Clear</button>
      </div>
      </div>
      <select id="week-select" aria-label="Week"></select>
    </div>
    <div class="tab-container" id="kid-tabs"></div>
  </div>
  <div id="kid-views"></div>
</div>

<div class="modal" id="category-detail-modal">
  <div class="modal-content">
    <h3 class="modal-title" id="category-detail-title">Category</h3>
    <p class="category-detail" id="category-detail-copy"></p>
    <div class="modal-actions">
      <button class="btn" id="edit-category-from-detail">Edit</button>
      <button class="btn primary" id="close-category-detail">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="category-modal">
  <div class="modal-content">
    <h3 class="modal-title">Categories</h3>
    <div class="modal-toolbar">
      <select id="category-person" aria-label="Person"></select>
      <select id="category-import-person" aria-label="Import from"></select>
      <button class="btn" id="import-categories" type="button">Import</button>
    </div>
    <div class="category-editor" id="category-editor"></div>
    <div class="modal-actions">
      <button class="btn" id="add-category">Add Row</button>
      <button class="btn" id="close-categories">Close</button>
      <button class="btn primary" id="save-categories">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="summary-modal">
  <div class="modal-content">
    <h3 class="modal-title">Summary</h3>
    <div class="summary-controls">
      <select id="summary-kind" aria-label="Summary type">
        <option value="overall">Overall</option>
        <option value="detailed">Detailed</option>
      </select>
      <select id="summary-timeframe" class="summary-overall-only" aria-label="Summary timeframe">
        <option value="all">All Dates</option>
        <option value="year">This Year</option>
        <option value="week">This Week</option>
      </select>
      <select id="summary-person" class="summary-detail-only" aria-label="Summary person"></select>
      <input id="summary-start" class="summary-detail-only" type="date" aria-label="Start date">
      <input id="summary-end" class="summary-detail-only" type="date" aria-label="End date">
      <select id="summary-bucket" class="summary-detail-only" aria-label="Detailed period">
        <option value="week">Weeks</option>
        <option value="month">Months</option>
        <option value="year">Years</option>
      </select>
      <select id="summary-mode" aria-label="Summary mode">
        <option value="sum">Sums</option>
        <option value="average">Averages</option>
        <option value="both">Sums and Averages</option>
      </select>
      <button class="btn" id="summary-refresh">Refresh</button>
    </div>
    <div id="summary-content" class="summary-empty">Choose a summary.</div>
    <div class="modal-actions">
      <button class="btn primary" id="summary-close">Close</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

const DEFAULT_CATEGORIES = [
  {key:"showerTeeth", label:"Shower", details:"Shower and brush teeth.", kind:"check", amount:0.25, group:"Care", goal:7, goalType:"min"},
  {key:"bedRoom", label:"Room", details:"Bedroom picked up and reset.", kind:"check", amount:0.25, group:"Care", goal:7, goalType:"min"},
  {key:"clothes", label:"Clothes", details:"Clothes put away or laundry handled.", kind:"check", amount:0.25, group:"Care", goal:7, goalType:"min"},
  {key:"deduction", label:"Deduct", details:"Daily deduction when needed.", kind:"check", amount:-2, group:"Behavior", goal:0, goalType:"min"},
  {key:"reading", label:"Read", details:"Reading or homework minutes.", kind:"number", amount:0.05, group:"Growth", goal:100, goalType:"min"},
  {key:"practice", label:"Practice", details:"Sports or skill practice minutes.", kind:"number", amount:0.05, group:"Growth", goal:100, goalType:"min"},
  {key:"workout", label:"Workout", details:"Workout or active movement minutes.", kind:"number", amount:0.05, group:"Growth", goal:100, goalType:"min"}
];
const DEFAULT_CATEGORY_MAP = Object.fromEntries(DEFAULT_CATEGORIES.map(category => [category.key, category]));
const CLEAR_PASSWORD = "clear";
const todayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
let currentWeek = getYearWeek();
let categories = [...DEFAULT_CATEGORIES];
let categoriesByKid = {};
let notesCache = {};
let tasksCache = {};
let logsCache = {};
let activeKid = kids[0];
let activeCategory = null;
let categoryEditorKid = kids[0];

function getYearWeek(date = new Date()) {
  const tmpDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = tmpDate.getUTCDay() || 7;
  tmpDate.setUTCDate(tmpDate.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(tmpDate.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((tmpDate - yearStart) / 86400000) + 1) / 7);
  return `${tmpDate.getUTCFullYear()}-W${weekNo}`;
}

function dollars(value) {
  return `$${Math.round(value)}`;
}

function noteKey(kid, day) {
  return `${kid}-${day}`;
}

function combinedGood(data = {}) {
  return data.goodReward ?? [data.good, data.rewards].filter(Boolean).join("\n");
}

function combinedBad(data = {}) {
  return data.badPunishment ?? [data.bad, data.punishments].filter(Boolean).join("\n");
}

function dayOptions(selected = todayIndex) {
  return days.map((day, index) => `<option value="${index}" ${index === selected ? "selected" : ""}>${day}</option>`).join("");
}

function makeId(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function promptDay(currentDay) {
  const entered = prompt("Day number, 1-7:", String(Number(currentDay) + 1));
  if (entered === null) return null;
  const day = Number(entered) - 1;
  return Number.isInteger(day) && day >= 0 && day < days.length ? day : Number(currentDay);
}

function formatTodayLabel() {
  return new Date().toLocaleDateString(undefined, {month:"short", day:"numeric"});
}

function previousWeekKey(weekKey = currentWeek) {
  const date = dateFromWeekKey(weekKey) || new Date();
  date.setUTCDate(date.getUTCDate() - 7);
  return getYearWeek(date);
}

function normalizeCategory(category, index) {
  const defaults = DEFAULT_CATEGORY_MAP[category.key] || {};
  const rawLabel = (category.label || defaults.label || category.key || `Row ${index + 1}`).trim();
  const label = defaults.label && !category.details ? defaults.label : rawLabel;
  const key = (category.key || label).trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase() || `row-${index + 1}`;
  const kind = ["check","number","calculated"].includes(category.kind) ? category.kind : "check";
  return {
    key,
    label,
    details:(category.details || defaults.details || label).trim(),
    kind,
    amount:Number(category.amount || 0),
    group:(category.group || defaults.group || "").trim(),
    goal:Number(category.goal ?? defaults.goal ?? 0),
    goalType:category.goalType === "max" ? "max" : "min",
    showProgress:category.showProgress === true || category.showTarget === true || category.showWeekly === true,
    formula:(category.formula || "").trim()
  };
}

function cloneCategories(list = DEFAULT_CATEGORIES) {
  return list.map((category, index) => normalizeCategory({...category}, index));
}

function categoriesForKid(kid) {
  if (!categoriesByKid[kid] || !categoriesByKid[kid].length) {
    categoriesByKid[kid] = cloneCategories(categories);
  }
  return categoriesByKid[kid];
}

function setAllKidsCategories(list) {
  const normalized = cloneCategories(list);
  categories = cloneCategories(normalized);
  categoriesByKid = Object.fromEntries(kids.map(kid => [kid, cloneCategories(normalized)]));
}

async function loadCategories() {
  const doc = await db.collection("settings").doc("tracker").get();
  const data = doc.exists ? doc.data() : {};
  if (data.categoriesByKid && typeof data.categoriesByKid === "object") {
    kids.forEach(kid => {
      const saved = Array.isArray(data.categoriesByKid[kid]) && data.categoriesByKid[kid].length ? data.categoriesByKid[kid] : data.categories;
      categoriesByKid[kid] = cloneCategories((saved || DEFAULT_CATEGORIES).filter(category => category.key !== "other"));
    });
    categories = cloneCategories(categoriesByKid[kids[0]]);
  } else if (Array.isArray(data.categories) && data.categories.length) {
    setAllKidsCategories(data.categories.filter(category => category.key !== "other"));
  } else {
    setAllKidsCategories(DEFAULT_CATEGORIES);
  }
}

async function saveCategories() {
  categoriesByKid[categoryEditorKid] = readCategoryEditor().map(normalizeCategory);
  categories = cloneCategories(categoriesByKid[kids[0]]);
  await db.collection("settings").doc("tracker").set({
    categories:categoriesByKid[kids[0]],
    categoriesByKid
  }, {merge:true});
  buildShell();
  await loadData(currentWeek);
  closeModal("category-modal");
}

function buildShell() {
  const tabs = document.getElementById("kid-tabs");
  const views = document.getElementById("kid-views");
  tabs.innerHTML = "";
  views.innerHTML = "";
  kids.forEach((kid, index) => {
    const tab = document.createElement("button");
    tab.className = `tab ${kid === activeKid ? "active" : ""}`;
    tab.dataset.kid = kid;
    tab.innerHTML = `<span class="kid-name">${kid}</span><span class="rank-circle" id="rank-${kid}">$0</span>`;
    tabs.appendChild(tab);

    const view = document.createElement("section");
    view.id = kid;
    view.className = `table-container ${kid === activeKid ? "active" : ""}`;
    views.appendChild(view);
  });
  buildTables();
}

    let html = `<div class="tracker-card"><div class="table-scroll"><table><thead><tr><th></th>`;
    days.forEach((day, i) => {
      const highlight = i === todayIndex ? "current-day" : "";
      html += `<th class="${highlight}" data-kid="${kid}" data-day="${i}" data-day-cell="${i}"><span class="day-head">${day}<span class="note-dots" id="${kid}-dots-${i}"></span></span></th>`;
    });
    if (showProgressColumn) html += `<th class="goal-progress-cell"></th>`;
    html += `</tr></thead><tbody>`;
    let previousGroup = "";
    kidCategories.forEach(category => {
      const group = category.group || "";
      const groupClass = group && group !== previousGroup ? "group-start" : "";
      previousGroup = group;
      html += `<tr class="${groupClass}"><td><button class="category-label" data-category-key="${category.key}" data-category-kid="${kid}"><span class="category-name">${escapeHtml(category.label)}</span></button></td>`;
      days.forEach((day, i) => {
        if (category.kind === "calculated") {
          html += `<td data-day-cell="${i}"><span class="calc-value" id="${kid}-calc-${category.key}-${i}">0</span></td>`;
        } else if (category.kind === "number") {
          html += `<td data-day-cell="${i}"><input type="number" min="0" inputmode="numeric" pattern="[0-9]*" data-kid="${kid}" data-day="${i}" data-type="${category.key}"></td>`;
        } else {
          const negative = category.amount < 0 ? "true" : "false";
          html += `<td data-day-cell="${i}"><input type="checkbox" data-negative="${negative}" data-kid="${kid}" data-day="${i}" data-type="${category.key}"></td>`;
        }
      });
      if (showProgressColumn) html += `<td class="goal-progress-cell" id="${kid}-week-${category.key}">${category.showProgress ? "<span class=\"goal-percent summary-goal-red\">0%</span>" : ""}</td>`;
      html += `</tr>`;
    });
    html += `<tr class="total-row"><td>Total</td>`;
    days.forEach((day, i) => { html += `<td id="${kid}-total-${i}" data-day-cell="${i}">$0</td>`; });

    html += `</tr></tbody></table></div></div>`;
    html += `<div class="work-grid"><div class="panel"><div class="panel-head"><span>Other Tasks</span><button class="panel-add" data-toggle-entry="${kid}-task-entry" aria-label="Add other task">+</button></div><div class="entry-row collapsed" id="${kid}-task-entry"><select id="${kid}-task-day" aria-label="Task day">${dayOptions()}</select><input id="${kid}-task-text" type="text" placeholder="Add task"><button class="btn primary" data-add-task="${kid}">Add</button></div><div class="task-list" id="${kid}-tasks"></div></div>`;
    html += `<div class="panel"><div class="panel-head"><span>Log</span><button class="panel-add" data-toggle-entry="${kid}-log-entry" aria-label="Add log entry">+</button></div><div class="log-compose collapsed" id="${kid}-log-entry"><select id="${kid}-log-day" aria-label="Log day">${dayOptions()}</select><select id="${kid}-log-type" aria-label="Good or bad"><option value="good">Good</option><option value="bad">Bad</option></select><input id="${kid}-log-note" type="text" placeholder="Note"><input id="${kid}-log-outcome" type="text" placeholder="Reward or punishment"><button class="btn primary" data-add-log="${kid}">Log</button></div><div class="log-list" id="${kid}-logs"></div></div></div>`;
    container.innerHTML = html;
    applyDayFocus(kid, todayIndex);

}

async function saveData(kid) {
  const data = {};
  days.forEach((day, i) => {
    categoriesForKid(kid).forEach(category => {
      if (category.kind === "calculated") return;
      const input = document.querySelector(`[data-kid="${kid}"][data-day="${i}"][data-type="${category.key}"]`);
      if (!input) return;
      data[`${i}-${category.key}`] = category.kind === "number" ? input.value : input.checked;
    });
  });
  await db.collection("weeks").doc(currentWeek).set({timestamp:new Date()}, {merge:true});
  await db.collection("weeks").doc(currentWeek).collection("chores").doc(kid).set(data);
  updateTotals();
}

async function loadData(weekKey = currentWeek) {
  currentWeek = weekKey;
  await ensureWeekOption(weekKey);
  notesCache = {};
  tasksCache = {};
  logsCache = {};
  for (const kid of kids) {
    const doc = await db.collection("weeks").doc(weekKey).collection("chores").doc(kid).get();
    const data = doc.exists ? doc.data() : {};
    days.forEach((day, i) => {
      categoriesForKid(kid).forEach(category => {
        if (category.kind === "calculated") return;
        const input = document.querySelector(`[data-kid="${kid}"][data-day="${i}"][data-type="${category.key}"]`);
        if (!input) return;
        if (category.kind === "number") input.value = data[`${i}-${category.key}`] || "";
        else input.checked = data[`${i}-${category.key}`] || false;
      });
    });
  }
  await loadWeeklyPanels();
  updateTotals();
}

async function loadWeeklyPanels() {
  for (const kid of kids) {
    for (let i = 0; i < days.length; i++) {
      const doc = await db.collection("weeks").doc(currentWeek).collection("notes").doc(noteKey(kid, i)).get();
      notesCache[noteKey(kid, i)] = doc.exists ? doc.data() : {};
    }
    await loadTasks(kid);
    await loadLogs(kid);
    renderTaskList(kid);
    renderLogList(kid);
  }
  renderNoteIndicators();
}

function formatRawValue(value) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "0";
  return Number.isInteger(number) ? String(number) : number.toFixed(1);
}

function formulaName(category) {
  return String(category.key || category.label || "").replace(/[^a-z0-9_]+/gi, "_").replace(/^_+|_+$/g, "") || "value";
}

function categoryDayValue(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") return evaluateFormula(category, kid, dayIndex, data, stack);
  if (data) {
    const value = data[`${dayIndex}-${category.key}`];
    return category.kind === "number" ? Number(value || 0) : value ? 1 : 0;
  }
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return 0;
  return category.kind === "number" ? Number(input.value || 0) : input.checked ? 1 : 0;
}

function evaluateFormula(category, kid, dayIndex, data = null, stack = new Set()) {
  const formula = (category.formula || "").trim();
  if (!formula || stack.has(category.key)) return 0;
  const nextStack = new Set(stack);
  nextStack.add(category.key);
  const scope = {};
  categoriesForKid(kid).forEach(other => {
    if (other.key === category.key) return;
    scope[formulaName(other)] = categoryDayValue(kid, other, dayIndex, data, nextStack);
  });
  try {
    const names = Object.keys(scope);
    const values = Object.values(scope);
    const result = Function(...names, `"use strict"; return (${formula});`)(...values);
    const number = Number(result);
    return Number.isFinite(number) ? number : 0;
  } catch (error) {
    return 0;
  }
}

function goalPercent(category, value) {
  const goal = Number(category.goal || 0);
  const number = Number(value || 0);
  if (!Number.isFinite(goal) || goal <= 0) {
    if (category.goalType === "max") return number <= 0 ? 100 : 0;
    return number > 0 ? 100 : 0;
  }
  return Math.round((number / goal) * 100);
}

function updateTotals() {
  kids.forEach(kid => {
    let kidTotal = 0;
    const weeklyRaw = {};
    days.forEach((day, i) => {
      let dayTotal = 0;
      categoriesForKid(kid).forEach(category => {
        const raw = categoryDayValue(kid, category, i);
        if (category.kind === "calculated") {
          const calcNode = document.getElementById(`${kid}-calc-${category.key}-${i}`);
          if (calcNode) calcNode.textContent = formatRawValue(raw);
        }
        weeklyRaw[category.key] = (weeklyRaw[category.key] || 0) + raw;
        dayTotal += raw * category.amount;
      });
      kidTotal += dayTotal;
      document.getElementById(`${kid}-total-${i}`).textContent = dollars(dayTotal);
    });
    categoriesForKid(kid).forEach(category => {
      const weekNode = document.getElementById(`${kid}-week-${category.key}`);
      if (weekNode) {
        if (category.showProgress) {
          const value = weeklyRaw[category.key] || 0;
          weekNode.innerHTML = `<span class="goal-percent ${goalClass(category, value)}">${goalPercent(category, value)}%</span>`;
        } else {
          weekNode.textContent = "";
        }
      }
    });
    document.getElementById(`rank-${kid}`).textContent = dollars(kidTotal);
  });
}

function scoreDataForKid(kid, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    categoriesForKid(kid).forEach(category => {
      total += categoryDayValue(kid, category, i, data) * category.amount;
    });
  });
  return total;
}

function categoryRawValue(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    total += categoryDayValue(kid, category, i, data);
  });
  return total;
}

function dateFromWeekKey(weekKey) {
  const match = String(weekKey).match(/^(\d{4})-W(\d{1,2})$/);
  if (!match) return null;
  const year = Number(match[1]);
  const week = Number(match[2]);
  const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
  const day = simple.getUTCDay() || 7;
  simple.setUTCDate(simple.getUTCDate() + 1 - day);
  return simple;
}

function bucketLabel(weekKey, bucket) {
  const date = dateFromWeekKey(weekKey);
  if (!date) return weekKey;
  if (bucket === "year") return String(date.getUTCFullYear());
  if (bucket === "month") return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`;
  return weekKey;
}

function weekInRange(weekKey, startValue, endValue) {
  const date = dateFromWeekKey(weekKey);
  if (!date) return true;
  const start = startValue ? new Date(`${startValue}T00:00:00Z`) : null;
  const end = endValue ? new Date(`${endValue}T23:59:59Z`) : null;
  if (start && date < start) return false;
  if (end && date > end) return false;
  return true;
}

async function summaryWeekKeys(timeframe = "all", startValue = "", endValue = "") {
  const snap = await db.collection("weeks").orderBy("timestamp", "desc").get();
  const keys = new Set([currentWeek]);
  snap.forEach(doc => {
    keys.add(doc.id);
  });
  const currentYear = String(currentWeek).split("-W")[0] || String(new Date().getFullYear());
  return [...keys].filter(key => {
    if (timeframe === "week" && key !== currentWeek) return false;
    if (timeframe === "year" && !key.startsWith(`${currentYear}-W`)) return false;
    return weekInRange(key, startValue, endValue);
  }).sort().reverse();
}

async function fetchOverallSummaryRows(timeframe) {
  const weekKeys = await summaryWeekKeys(timeframe);
  const rows = kids.map(kid => ({
    kid,
    score:0,
    tasks:0,
    done:0,
    good:0,
    bad:0,
    weeks:weekKeys.length || 1
  }));
  for (const weekKey of weekKeys) {
    for (const row of rows) {
      const choresDoc = await db.collection("weeks").doc(weekKey).collection("chores").doc(row.kid).get();
      row.score += scoreDataForKid(row.kid, choresDoc.exists ? choresDoc.data() : {});

      const taskDoc = await db.collection("weeks").doc(weekKey).collection("tasks").doc(row.kid).get();
      const taskItems = taskDoc.exists && Array.isArray(taskDoc.data().items) ? taskDoc.data().items : [];
      row.tasks += taskItems.length;
      row.done += taskItems.filter(item => item.done).length;

      const logDoc = await db.collection("weeks").doc(weekKey).collection("logs").doc(row.kid).get();
      const logItems = logDoc.exists && Array.isArray(logDoc.data().entries) ? logDoc.data().entries : [];
      row.good += logItems.filter(item => item.type !== "bad").length;
      row.bad += logItems.filter(item => item.type === "bad").length;
    }
  }
  return rows;
}

function renderOverallSummaryRows(rows, mode) {
  const showSums = mode === "sum" || mode === "both";
  const showAverages = mode === "average" || mode === "both";
  let head = `<tr><th>Person</th>`;
  if (showSums) head += `<th>Score</th><th>Tasks</th><th>Done</th><th>Good</th><th>Bad</th>`;
  if (showAverages) head += `<th>Avg/day</th><th>Avg/week</th><th>Tasks/week</th><th>Logs/week</th>`;
  head += `</tr>`;
  const body = rows.map(row => {
    const weeks = row.weeks || 1;
    const dayCount = weeks * days.length;
    let html = `<tr><td>${row.kid}</td>`;
    if (showSums) html += `<td>${dollars(row.score)}</td><td>${row.tasks}</td><td>${row.done}</td><td>${row.good}</td><td>${row.bad}</td>`;
    if (showAverages) html += `<td>${dollars(row.score / dayCount)}</td><td>${dollars(row.score / weeks)}</td><td>${(row.tasks / weeks).toFixed(1)}</td><td>${((row.good + row.bad) / weeks).toFixed(1)}</td>`;
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

async function fetchDetailedSummary(kid, bucket, startValue, endValue) {
  const weekKeys = await summaryWeekKeys("all", startValue, endValue);
  const buckets = {};
  for (const weekKey of weekKeys) {
    const label = bucketLabel(weekKey, bucket);
    if (!buckets[label]) buckets[label] = {weeks:new Set(), values:{}};
    buckets[label].weeks.add(weekKey);
    const choresDoc = await db.collection("weeks").doc(weekKey).collection("chores").doc(kid).get();
    const data = choresDoc.exists ? choresDoc.data() : {};
    categoriesForKid(kid).forEach(category => {
      buckets[label].values[category.key] = (buckets[label].values[category.key] || 0) + categoryRawValue(kid, category, data);
    });
  }
  return {
    labels:Object.keys(buckets).sort().reverse(),
    buckets
  };
}

function renderDetailedSummary(kid, detail, mode) {
  const categories = categoriesForKid(kid);
  const showSums = mode === "sum" || mode === "both";
  const showAverages = mode === "average" || mode === "both";
  let head = `<tr><th>Item</th><th>Goal</th>`;
  detail.labels.forEach(label => {
    if (showSums) head += `<th>${label}</th>`;
    if (showAverages) head += `<th>${label}</th>`;
  });
  head += `</tr>`;
  let previousGroup = "";
  const body = categories.map(category => {
    const group = category.group || "";
    const groupClass = group && group !== previousGroup ? "group-start" : "";
    previousGroup = group;
    const goalType = category.goalType === "min" ? "Min" : "Max";
    let html = `<tr class="${groupClass}"><td>${escapeHtml(category.label)}</td><td>${goalType} ${Number(category.goal || 0)}</td>`;
    detail.labels.forEach(label => {
      const bucket = detail.buckets[label];
      const sum = bucket.values[category.key] || 0;
      const avg = sum / Math.max(bucket.weeks.size, 1);
      if (showSums) html += `<td class="${goalClass(category, sum)}">${sum.toFixed(0)}</td>`;
      if (showAverages) html += `<td class="${goalClass(category, avg)}">${avg.toFixed(1)}</td>`;
    });
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function goalClass(category, value) {
  const goal = Number(category.goal || 0);
  if (!Number.isFinite(goal) || goal < 0) return "";
  if (category.goalType === "min") {
    if (goal === 0) return value > 0 ? "summary-goal-blue" : "summary-goal-green";
    if (value >= goal * 1.5) return "summary-goal-blue";
    if (value >= goal) return "summary-goal-green";
    if (value >= goal * .5) return "summary-goal-yellow";
    return "summary-goal-red";
  }
  if (goal === 0) return value <= 0 ? "summary-goal-green" : "summary-goal-red";
  if (value <= goal * .5) return "summary-goal-blue";
  if (value <= goal) return "summary-goal-green";
  if (value <= goal * 1.5) return "summary-goal-yellow";
  return "summary-goal-red";
}

async function refreshSummary() {
  const content = document.getElementById("summary-content");
  const kind = document.getElementById("summary-kind").value;
  const mode = document.getElementById("summary-mode").value;
  content.className = "summary-empty";
  content.textContent = "Loading summary...";
  if (kind === "detailed") {
    const kid = document.getElementById("summary-person").value || activeKid;
    const bucket = document.getElementById("summary-bucket").value;
    const startValue = document.getElementById("summary-start").value;
    const endValue = document.getElementById("summary-end").value;
    const detail = await fetchDetailedSummary(kid, bucket, startValue, endValue);
    content.className = "";
    content.innerHTML = detail.labels.length ? renderDetailedSummary(kid, detail, mode) : `<div class="summary-empty">No data in this range.</div>`;
    return;
  }
  const rows = await fetchOverallSummaryRows(document.getElementById("summary-timeframe").value);
  content.className = "";
  content.innerHTML = renderOverallSummaryRows(rows, mode);
}

async function openSummary() {
  document.getElementById("summary-person").innerHTML = kids.map(kid => `<option value="${kid}" ${kid === activeKid ? "selected" : ""}>${kid}</option>`).join("");
  syncSummaryControls();
  openModal("summary-modal");
  await refreshSummary();
}

function syncSummaryControls() {
  const detailed = document.getElementById("summary-kind").value === "detailed";
  document.querySelectorAll(".summary-detail-only").forEach(control => {
    control.style.display = detailed ? "" : "none";
  });
  document.querySelectorAll(".summary-overall-only").forEach(control => {
    control.style.display = detailed ? "none" : "";
  });
}

function switchKid(kid) {
  activeKid = kid;
  document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.kid === kid));
  document.querySelectorAll(".table-container").forEach(view => view.classList.toggle("active", view.id === kid));
}

function applyDayFocus(kid, dayIndex) {
  const container = document.getElementById(kid);
  if (!container) return;
  container.querySelectorAll("[data-day-cell]").forEach(cell => {
    cell.classList.toggle("hidden-day", Number(cell.dataset.dayCell) !== Number(dayIndex));
  });
  container.querySelectorAll("[data-filter-day]").forEach(button => {
    button.classList.toggle("active", Number(button.dataset.filterDay) === Number(dayIndex));
  });
}

function renderNoteIndicators() {
  kids.forEach(kid => {
    days.forEach((day, i) => {
      const hasTask = (tasksCache[kid] || []).some(task => Number(task.day) === i && (task.text || "").trim());
      const hasGood = (logsCache[kid] || []).some(entry => Number(entry.day) === i && entry.type === "good");
      const hasBad = (logsCache[kid] || []).some(entry => Number(entry.day) === i && entry.type === "bad");
      const dots = document.getElementById(`${kid}-dots-${i}`);
      if (!dots) return;
      dots.innerHTML = "";
      if (hasTask) dots.insertAdjacentHTML("beforeend", `<span class="note-dot other" title="Other task"></span>`);
      if (hasGood) dots.insertAdjacentHTML("beforeend", `<span class="note-dot good" title="Good"></span>`);
      if (hasBad) dots.insertAdjacentHTML("beforeend", `<span class="note-dot bad" title="Bad"></span>`);
    });
  });
}

async function loadTasks(kid) {
  const doc = await db.collection("weeks").doc(currentWeek).collection("tasks").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().items) ? doc.data().items : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    if ((data.other || "").trim()) {
      legacy.push({id:`legacy-task-${i}`, day:i, text:data.other, done:!!data.otherDone, legacy:true});
    }
  });
  tasksCache[kid] = saved.length ? saved : legacy;
}

async function saveTasks(kid) {
  await db.collection("weeks").doc(currentWeek).set({timestamp:new Date()}, {merge:true});
  await db.collection("weeks").doc(currentWeek).collection("tasks").doc(kid).set({items:tasksCache[kid] || [], updatedAt:new Date()});
}

function renderTaskList(kid) {
  const list = document.getElementById(`${kid}-tasks`);
  if (!list) return;
  const items = tasksCache[kid] || [];
  if (!items.length) {
    list.innerHTML = `<div class="empty-state">No other tasks added yet.</div>`;
    return;
  }
  list.innerHTML = items.map(item => {
    const done = item.done ? "done" : "";
    const label = item.done ? "Done" : "To do";
    return `<div class="task-item ${done}"><div class="day-chip">${days[Number(item.day)] || "Any"}</div><div class="task-text">${escapeHtml(item.text || "")}</div><button class="status-pill" data-toggle-task="${kid}" data-task-id="${item.id}">${label}</button><button class="mini-action" title="Edit" aria-label="Edit task" data-edit-task="${kid}" data-task-id="${item.id}">✎</button><button class="mini-action delete" title="Delete" aria-label="Delete task" data-delete-task="${kid}" data-task-id="${item.id}">×</button></div>`;
  }).join("");
}

async function addTask(kid) {
  const textInput = document.getElementById(`${kid}-task-text`);
  const dayInput = document.getElementById(`${kid}-task-day`);
  const text = textInput.value.trim();
  if (!text) return;
  tasksCache[kid] = [...(tasksCache[kid] || []), {id:makeId("task"), day:Number(dayInput.value), text, done:false}];
  textInput.value = "";
  await saveTasks(kid);
  document.getElementById(`${kid}-task-entry`)?.classList.add("collapsed");
  renderTaskList(kid);
  renderNoteIndicators();
}

async function toggleTask(kid, id) {
  tasksCache[kid] = (tasksCache[kid] || []).map(task => task.id === id ? {...task, done:!task.done} : task);
  await saveTasks(kid);
  renderTaskList(kid);
  renderNoteIndicators();
}

async function editTask(kid, id) {
  const task = (tasksCache[kid] || []).find(item => item.id === id);
  if (!task) return;
  const day = promptDay(task.day);
  if (day === null) return;
  const text = prompt("Edit task:", task.text || "");
  if (text === null) return;
  const trimmed = text.trim();
  if (!trimmed) return;
  tasksCache[kid] = (tasksCache[kid] || []).map(item => item.id === id ? {...item, day, text:trimmed} : item);
  await saveTasks(kid);
  renderTaskList(kid);
  renderNoteIndicators();
}

async function deleteTask(kid, id) {
  if (!confirm("Delete this task?")) return;
  tasksCache[kid] = (tasksCache[kid] || []).filter(item => item.id !== id);
  await saveTasks(kid);
  renderTaskList(kid);
  renderNoteIndicators();
}

async function loadLogs(kid) {
  const doc = await db.collection("weeks").doc(currentWeek).collection("logs").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().entries) ? doc.data().entries : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    const good = combinedGood(data).trim();
    const bad = combinedBad(data).trim();
    if (good) legacy.push({id:`legacy-good-${i}`, day:i, type:"good", note:good, outcome:"", legacy:true});
    if (bad) legacy.push({id:`legacy-bad-${i}`, day:i, type:"bad", note:bad, outcome:"", legacy:true});
  });
  logsCache[kid] = saved.length ? saved : legacy;
}

async function saveLogs(kid) {
  await db.collection("weeks").doc(currentWeek).set({timestamp:new Date()}, {merge:true});
  await db.collection("weeks").doc(currentWeek).collection("logs").doc(kid).set({entries:logsCache[kid] || [], updatedAt:new Date()});
}

function renderLogList(kid) {
  const list = document.getElementById(`${kid}-logs`);
  if (!list) return;
  const entries = logsCache[kid] || [];
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">No good or bad notes logged yet.</div>`;
    return;
  }
  list.innerHTML = entries.slice().reverse().map(entry => {
    const type = entry.type === "bad" ? "bad" : "good";
    const outcomeLabel = type === "bad" ? "Punishment" : "Reward";
    return `<div class="log-item ${type}"><div class="log-main"><span class="day-chip">${days[Number(entry.day)] || "Any"}</span><div class="log-copy">${escapeHtml(entry.note || "")}</div><button class="mini-action" title="Edit" aria-label="Edit log entry" data-edit-log="${kid}" data-log-id="${entry.id}">✎</button><button class="mini-action delete" title="Delete" aria-label="Delete log entry" data-delete-log="${kid}" data-log-id="${entry.id}">×</button></div><div class="log-outcome">${outcomeLabel}: ${escapeHtml(entry.outcome || "")}</div></div>`;
  }).join("");
}

async function addLog(kid) {
  const dayInput = document.getElementById(`${kid}-log-day`);
  const typeInput = document.getElementById(`${kid}-log-type`);
  const noteInput = document.getElementById(`${kid}-log-note`);
  const outcomeInput = document.getElementById(`${kid}-log-outcome`);
  const note = noteInput.value.trim();
  const outcome = outcomeInput.value.trim();
  if (!note && !outcome) return;
  logsCache[kid] = [...(logsCache[kid] || []), {id:makeId("log"), day:Number(dayInput.value), type:typeInput.value, note, outcome}];
  noteInput.value = "";
  outcomeInput.value = "";
  await saveLogs(kid);
  document.getElementById(`${kid}-log-entry`)?.classList.add("collapsed");
  renderLogList(kid);
  renderNoteIndicators();
}

async function editLog(kid, id) {
  const entry = (logsCache[kid] || []).find(item => item.id === id);
  if (!entry) return;
  const day = promptDay(entry.day);
  if (day === null) return;
  const typeInput = prompt("Type good or bad:", entry.type || "good");
  if (typeInput === null) return;
  const type = typeInput.trim().toLowerCase() === "bad" ? "bad" : "good";
  const note = prompt("Edit note:", entry.note || "");
  if (note === null) return;
  const outcome = prompt(type === "bad" ? "Edit punishment:" : "Edit reward:", entry.outcome || "");
  if (outcome === null) return;
  logsCache[kid] = (logsCache[kid] || []).map(item => item.id === id ? {...item, day, type, note:note.trim(), outcome:outcome.trim()} : item);
  await saveLogs(kid);
  renderLogList(kid);
  renderNoteIndicators();
}

async function deleteLog(kid, id) {
  if (!confirm("Delete this log entry?")) return;
  logsCache[kid] = (logsCache[kid] || []).filter(item => item.id !== id);
  await saveLogs(kid);
  renderLogList(kid);
  renderNoteIndicators();
}

function openCategoryDetail(key, kid = activeKid) {
  const category = categoriesForKid(kid).find(item => item.key === key);
  if (!category) return;
  activeCategory = key;
  document.getElementById("category-detail-title").textContent = category.label;
  const meta = [category.group ? `Group: ${category.group}` : "", Number(category.goal || 0) ? `Goal: ${category.goalType === "min" ? "Min" : "Max"} ${category.goal}` : ""].filter(Boolean).join("  ");
  document.getElementById("category-detail-copy").textContent = [category.details || "No notes added for this category yet.", meta].filter(Boolean).join("\n");
  openModal("category-detail-modal");
}

async function populateWeekDropdown() {
  const select = document.getElementById("week-select");
  select.innerHTML = "";
  const weeksSnap = await db.collection("weeks").get();
  const seen = new Set();
  weeksSnap.forEach(doc => {
    seen.add(doc.id);
  });
  seen.add(currentWeek);
  [...seen].sort((a, b) => b.localeCompare(a, undefined, {numeric:true})).forEach(weekKey => {
    select.appendChild(new Option(weekKey, weekKey, weekKey === currentWeek, weekKey === currentWeek));
  });
  select.appendChild(new Option("Add New", "__add_new__"));
}

async function ensureWeekOption(weekKey) {
  const select = document.getElementById("week-select");
  if (![...select.options].some(option => option.value === weekKey)) {
    select.prepend(new Option(weekKey, weekKey, true, true));
  }
  select.value = weekKey;
}

async function addHistoricalWeek() {
  const entered = prompt("Week to add, like 2026-W07:", previousWeekKey());
  if (entered === null) return;
  const weekKey = entered.trim().toUpperCase();
  if (!/^\d{4}-W\d{2}$/.test(weekKey)) {
    alert("Use the format YYYY-W##.");
    document.getElementById("week-select").value = currentWeek;
    return;
  }
  const existing = document.getElementById("week-select");
  if ([...existing.options].some(option => option.value === weekKey)) {
    alert("That week already exists.");
    existing.value = currentWeek;
    return;
  }
  await db.collection("weeks").doc(weekKey).set({timestamp:new Date(), historical:true}, {merge:true});
  await populateWeekDropdown();
  await loadData(weekKey);
}

function renderCategoryEditor(kid = categoryEditorKid) {
  const editor = document.getElementById("category-editor");
  editor.innerHTML = "";
  categoriesForKid(kid).forEach(addCategoryRow);
}

function openCategoryEditor(kid = activeKid) {
  categoryEditorKid = kid;
  const personSelect = document.getElementById("category-person");
  personSelect.innerHTML = kids.map(name => `<option value="${name}" ${name === categoryEditorKid ? "selected" : ""}>${name}</option>`).join("");
  const importSelect = document.getElementById("category-import-person");
  importSelect.innerHTML = kids.filter(name => name !== categoryEditorKid).map(name => `<option value="${name}">${name}</option>`).join("");
  renderCategoryEditor(categoryEditorKid);
  openModal("category-modal");
}

function refreshImportOptions() {
  const importSelect = document.getElementById("category-import-person");
  importSelect.innerHTML = kids.filter(name => name !== categoryEditorKid).map(name => `<option value="${name}">${name}</option>`).join("");
}

function importCategoryConfig() {
  const importFrom = document.getElementById("category-import-person").value;
  if (!importFrom || importFrom === categoryEditorKid) return;
  if (!confirm(`Import ${importFrom}'s configuration for ${categoryEditorKid}? This will not change any tracker data.`)) return;
  categoriesByKid[categoryEditorKid] = cloneCategories(categoriesForKid(importFrom));
  renderCategoryEditor(categoryEditorKid);
}

function addCategoryRow(category = {label:"New", details:"Category notes", kind:"check", amount:0.25, group:"", goal:0, goalType:"min", showProgress:false, formula:""}) {
  const editor = document.getElementById("category-editor");
  const row = document.createElement("div");
  row.className = "category-row";
  row.dataset.key = category.key || "";
  const showProgress = category.showProgress === true || category.showTarget === true || category.showWeekly === true;
  row.innerHTML = `
    <div class="move-pair">
      <button class="btn move-category" type="button" data-move-category="up" aria-label="Move up">↑</button>
      <button class="btn move-category" type="button" data-move-category="down" aria-label="Move down">↓</button>
    </div>
    <input aria-label="Label" data-field="label" placeholder="Label" value="${escapeAttr(category.label || "")}">
    <textarea aria-label="Notes" data-field="details" placeholder="Tap notes">${escapeHtml(category.details || "")}</textarea>
    <input aria-label="Group" data-field="group" placeholder="Group" value="${escapeAttr(category.group || "")}">
    <input aria-label="Formula" data-field="formula" placeholder="Formula" value="${escapeAttr(category.formula || "")}">
    <select aria-label="Type" data-field="kind">
      <option value="check" ${category.kind === "check" ? "selected" : ""}>Check</option>
      <option value="number" ${category.kind === "number" ? "selected" : ""}>Number</option>
      <option value="calculated" ${category.kind === "calculated" ? "selected" : ""}>Calc</option>
    </select>
    <input aria-label="Value" data-field="amount" type="number" step="0.01" value="${Number(category.amount || 0)}">
    <input aria-label="Goal" data-field="goal" type="number" step="1" value="${Number(category.goal || 0)}">
    <select aria-label="Goal type" data-field="goalType">
      <option value="min" ${category.goalType === "min" ? "selected" : ""}>Min</option>
      <option value="max" ${category.goalType === "max" ? "selected" : ""}>Max</option>
    </select>
    <select aria-label="Show weekly target" data-field="showProgress">
      <option value="false" ${showProgress ? "" : "selected"}>Hide</option>
      <option value="true" ${showProgress ? "selected" : ""}>Show</option>
    </select>
    <button class="icon-btn remove-category" type="button" aria-label="Remove">x</button>
  `;
  editor.appendChild(row);
}

function readCategoryEditor() {
  return [...document.querySelectorAll(".category-row")].map((row, index) => {
    const label = row.querySelector('[data-field="label"]').value.trim() || `Row ${index + 1}`;
    return {
      key:row.dataset.key || label,
      label,
      details:row.querySelector('[data-field="details"]').value.trim(),
      kind:row.querySelector('[data-field="kind"]').value,
      amount:Number(row.querySelector('[data-field="amount"]').value || 0),
      group:row.querySelector('[data-field="group"]').value.trim(),
      goal:Number(row.querySelector('[data-field="goal"]').value || 0),
      goalType:row.querySelector('[data-field="goalType"]').value,
      showProgress:row.querySelector('[data-field="showProgress"]').value === "true",
      formula:row.querySelector('[data-field="formula"]').value.trim()
    };
  });
}

function openModal(id) {
  document.getElementById(id).style.display = "flex";
}

function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

function escapeHtml(text = "") {
  return text.replace(/[&<>"']/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));
}

function escapeAttr(text = "") {
  return escapeHtml(String(text));
}

function closeActionsMenu() {
  document.getElementById("actions-menu")?.classList.remove("open");
}

document.getElementById("more-actions").addEventListener("click", event => {
  event.stopPropagation();
  document.getElementById("actions-menu").classList.toggle("open");
});

document.body.addEventListener("click", async event => {
  if (!event.target.closest(".menu-wrap")) closeActionsMenu();

  const tab = event.target.closest(".tab");
  if (tab) switchKid(tab.dataset.kid);

  const categoryButton = event.target.closest("[data-category-key]");
  if (categoryButton) openCategoryDetail(categoryButton.dataset.categoryKey, categoryButton.dataset.categoryKid);

  const dayFilterButton = event.target.closest("[data-filter-day]");
  if (dayFilterButton) applyDayFocus(dayFilterButton.dataset.filterKid, dayFilterButton.dataset.filterDay);

  const toggleEntryButton = event.target.closest("[data-toggle-entry]");
  if (toggleEntryButton) {
    const form = document.getElementById(toggleEntryButton.dataset.toggleEntry);
    if (form) form.classList.toggle("collapsed");
  }

  const addTaskButton = event.target.closest("[data-add-task]");
  if (addTaskButton) await addTask(addTaskButton.dataset.addTask);

  const toggle = event.target.closest("[data-toggle-task]");
  if (toggle) await toggleTask(toggle.dataset.toggleTask, toggle.dataset.taskId);

  const editTaskButton = event.target.closest("[data-edit-task]");
  if (editTaskButton) await editTask(editTaskButton.dataset.editTask, editTaskButton.dataset.taskId);

  const deleteTaskButton = event.target.closest("[data-delete-task]");
  if (deleteTaskButton) await deleteTask(deleteTaskButton.dataset.deleteTask, deleteTaskButton.dataset.taskId);

  const addLogButton = event.target.closest("[data-add-log]");
  if (addLogButton) await addLog(addLogButton.dataset.addLog);

  const editLogButton = event.target.closest("[data-edit-log]");
  if (editLogButton) await editLog(editLogButton.dataset.editLog, editLogButton.dataset.logId);

  const deleteLogButton = event.target.closest("[data-delete-log]");
  if (deleteLogButton) await deleteLog(deleteLogButton.dataset.deleteLog, deleteLogButton.dataset.logId);

  const moveCategoryButton = event.target.closest("[data-move-category]");
  if (moveCategoryButton) {
    const row = moveCategoryButton.closest(".category-row");
    if (row && moveCategoryButton.dataset.moveCategory === "up" && row.previousElementSibling) {
      row.parentElement.insertBefore(row, row.previousElementSibling);
    }
    if (row && moveCategoryButton.dataset.moveCategory === "down" && row.nextElementSibling) {
      row.parentElement.insertBefore(row.nextElementSibling, row);
    }
  }

  if (event.target.closest(".remove-category")) event.target.closest(".category-row").remove();
});

document.getElementById("edit-categories").addEventListener("click", () => {
  closeActionsMenu();
  openCategoryEditor();
});
document.getElementById("summary-open").addEventListener("click", async () => {
  closeActionsMenu();
  await openSummary();
});
document.getElementById("summary-refresh").addEventListener("click", refreshSummary);
document.getElementById("summary-kind").addEventListener("change", async () => {
  syncSummaryControls();
  await refreshSummary();
});
document.getElementById("summary-timeframe").addEventListener("change", refreshSummary);
document.getElementById("summary-person").addEventListener("change", refreshSummary);
document.getElementById("summary-start").addEventListener("change", refreshSummary);
document.getElementById("summary-end").addEventListener("change", refreshSummary);
document.getElementById("summary-bucket").addEventListener("change", refreshSummary);
document.getElementById("summary-mode").addEventListener("change", refreshSummary);
document.getElementById("summary-close").addEventListener("click", () => closeModal("summary-modal"));
document.getElementById("add-category").addEventListener("click", () => addCategoryRow());
document.getElementById("import-categories").addEventListener("click", importCategoryConfig);
document.getElementById("category-person").addEventListener("change", event => {
  categoriesByKid[categoryEditorKid] = readCategoryEditor().map(normalizeCategory);
  categoryEditorKid = event.target.value;
  refreshImportOptions();
  renderCategoryEditor(categoryEditorKid);
});
document.getElementById("close-categories").addEventListener("click", () => closeModal("category-modal"));
document.getElementById("save-categories").addEventListener("click", saveCategories);
document.getElementById("close-category-detail").addEventListener("click", () => closeModal("category-detail-modal"));
document.getElementById("edit-category-from-detail").addEventListener("click", () => {
  closeModal("category-detail-modal");
  openCategoryEditor();
});
document.getElementById("archive-week").addEventListener("click", async () => {
  closeActionsMenu();
  await db.collection("weeks").doc(currentWeek).set({archived:true, timestamp:new Date()}, {merge:true});
  await populateWeekDropdown();
});
document.getElementById("clear-week").addEventListener("click", async () => {
  closeActionsMenu();
  const pass = prompt("Enter password to clear week:");
  if (pass !== CLEAR_PASSWORD) {
    alert("Incorrect password.");
    return;
  }
  for (const collectionName of ["chores", "notes", "notepads", "tasks", "logs"]) {
    const snap = await db.collection("weeks").doc(currentWeek).collection(collectionName).get();
    for (const doc of snap.docs) await doc.ref.delete();
  }
  await loadData(currentWeek);
});
document.getElementById("week-select").addEventListener("change", async event => {
  if (event.target.value === "__add_new__") {
    await addHistoricalWeek();
    return;
  }
  await loadData(event.target.value);
});
document.body.addEventListener("change", event => {
  const input = event.target.closest("[data-kid][data-day][data-type]");
  if (input) saveData(input.dataset.kid);
});

document.body.addEventListener("input", event => {
  const input = event.target.closest("[data-kid][data-day][data-type]");
  if (input) updateTotals();
});

window.onload = async () => {
  await loadCategories();
  buildShell();
  await populateWeekDropdown();
  await loadData(currentWeek);
};
</script>
